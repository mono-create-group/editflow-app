// ─── BLOCK DRAG & DROP ───
let _dragBlockIdx=null,_dragBlockPid=null;
function blockDragStart(e,idx,pid){
  _dragBlockIdx=idx;_dragBlockPid=pid;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging-block');
}
function blockDragEnd(e){
  _dragBlockIdx=null;_dragBlockPid=null;
  document.querySelectorAll('.notion-block-wrap').forEach(el=>{
    el.classList.remove('dragging-block','drag-over-block');
  });
}
function blockDragOver(e,idx,pid){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(_dragBlockPid!==pid)return;
  document.querySelectorAll('.notion-block-wrap').forEach(el=>el.classList.remove('drag-over-block'));
  if(_dragBlockIdx!==idx)e.currentTarget.classList.add('drag-over-block');
}
function blockDrop(e,toIdx,pid){
  e.preventDefault();
  document.querySelectorAll('.notion-block-wrap').forEach(el=>el.classList.remove('drag-over-block'));
  if(_dragBlockPid!==pid||_dragBlockIdx===null||_dragBlockIdx===toIdx)return;
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const from=_dragBlockIdx,to=toIdx;
  const [moved]=page.blocks.splice(from,1);
  page.blocks.splice(to,0,moved);
  _dragBlockIdx=null;_dragBlockPid=null;
  save();render();
}

// ─── KEYBOARD: Enter / Backspace ───
function blockKeyDown(e,el){
  // If slash popup is active, let slashKeyDown handle keys
  if(_slashState&&_slashState.el===el)return;
  const pid=el.dataset.pid||el.closest('[data-pid]')?.dataset.pid;
  const idx=+(el.dataset.idx||el.closest('[data-block-idx]')?.dataset.blockIdx);
  if(pid==null||isNaN(idx))return;
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const b=page.blocks[idx];if(!b)return;
  const isHeading=['h1','h2','h3','heading'].includes(b.type);
  const isText=['text','note','quote'].includes(b.type);

  // Enter key
  if(e.key==='Enter'&&!e.shiftKey){
    // Heading → add text block below
    if(isHeading){
      e.preventDefault();
      addBlock(pid,'text',idx);
      return;
    }
    // Text/note/quote: Shift+Enter = newline (default), Enter = new same-type block
    if(isText){
      e.preventDefault();
      const content=el.value||'';
      const isEmpty=!content.trim();
      addBlock(pid,isEmpty?'text':b.type,idx);
      return;
    }
  }

  // Backspace on empty text-like block → delete block and focus prev
  if(e.key==='Backspace'){
    const val=el.value||'';
    if(!val){
      e.preventDefault();
      if(page.blocks.length<=1)return;
      page.blocks.splice(idx,1);
      save();render();
      // focus previous block
      setTimeout(()=>{
        const prevIdx=Math.max(0,idx-1);
        const prevEl=document.querySelector(`[data-block-idx="${prevIdx}"] textarea,[data-block-idx="${prevIdx}"] input`);
        if(prevEl){prevEl.focus();if(prevEl.tagName==='TEXTAREA'){const l=prevEl.value.length;prevEl.selectionStart=prevEl.selectionEnd=l;}}
      },30);
    }
  }
}

// ─── LIST ITEM KEYBOARD ───
function listItemKeyDown(e,el,pid,blockIdx,itemIdx){
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const b=page.blocks[blockIdx];if(!b)return;
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    b.items=b.items||[''];
    b.items.splice(itemIdx+1,0,'');
    save();render();
    setTimeout(()=>{
      const inputs=document.querySelectorAll(`[data-block-idx="${blockIdx}"][data-pid="${pid}"] ~ div input, .notion-block-wrap[data-block-idx="${blockIdx}"] input`);
      // find the new input at itemIdx+1
      const allInputs=document.querySelectorAll('.notion-block-wrap input');
      // simpler: re-query the block wrapper
      const wrap=document.querySelector(`.notion-block-wrap[data-block-idx="${blockIdx}"]`);
      if(wrap){const ins=wrap.querySelectorAll('input');if(ins[itemIdx+1])ins[itemIdx+1].focus();}
    },30);
    return;
  }
  if(e.key==='Backspace'&&!el.value){
    e.preventDefault();
    b.items=b.items||[''];
    if(b.items.length<=1){
      // Remove the whole block if only one empty item
      page.blocks.splice(blockIdx,1);
      save();render();
      setTimeout(()=>{
        const prevIdx=Math.max(0,blockIdx-1);
        const prevEl=document.querySelector(`.notion-block-wrap[data-block-idx="${prevIdx}"] textarea,.notion-block-wrap[data-block-idx="${prevIdx}"] input`);
        if(prevEl){prevEl.focus();}
      },30);
    }else{
      b.items.splice(itemIdx,1);
      save();render();
      setTimeout(()=>{
        const wrap=document.querySelector(`.notion-block-wrap[data-block-idx="${blockIdx}"]`);
        if(wrap){const ins=wrap.querySelectorAll('input');const target=ins[Math.max(0,itemIdx-1)];if(target){target.focus();target.selectionStart=target.selectionEnd=target.value.length;}}
      },30);
    }
    return;
  }
}

// ─── SLASH COMMAND ───
let _slashState=null; // {pid,idx,el}
let _slashSelIdx=0;
let _slashFiltered=[];

function slashKeyDown(e,el,pid,idx){
  // Detect '/' at start or line start
  if(e.key==='/' && !_slashState){
    const val=el.value||'';
    const pos=el.selectionStart;
    const before=val.slice(0,pos);
    if(before===''||before.endsWith('\n')){
      _slashState={pid,idx,el,pos};
      _slashSelIdx=0;
      _slashFiltered=[...SLASH_COMMANDS];
      showSlashPopup(el);
      return;
    }
  }
  if(!_slashState||_slashState.el!==el)return;

  if(e.key==='Escape'){e.preventDefault();hideSlashPopup();return;}
  if(e.key==='ArrowDown'){e.preventDefault();_slashSelIdx=(_slashSelIdx+1)%_slashFiltered.length;renderSlashSel();return;}
  if(e.key==='ArrowUp'){e.preventDefault();_slashSelIdx=(_slashSelIdx-1+_slashFiltered.length)%_slashFiltered.length;renderSlashSel();return;}
  if(e.key==='Enter'){
    e.preventDefault();
    const cmd=_slashFiltered[_slashSelIdx];
    if(cmd){confirmSlashCmd(cmd);}
    return;
  }
  if(e.key==='Backspace'){
    // If query becomes empty (just the slash deleted), close
    setTimeout(()=>{
      const val=el.value||'';
      const pos=el.selectionStart;
      const before=val.slice(0,pos);
      const slashPos=before.lastIndexOf('/');
      if(slashPos<0){hideSlashPopup();return;}
      updateSlashFilter(before.slice(slashPos+1));
    },0);
    return;
  }
  // Filter on normal key
  setTimeout(()=>{
    const val=el.value||'';
    const pos=el.selectionStart;
    const before=val.slice(0,pos);
    const slashPos=before.lastIndexOf('/');
    if(slashPos<0){hideSlashPopup();return;}
    updateSlashFilter(before.slice(slashPos+1));
  },0);
}

function updateSlashFilter(query){
  const q=query.toLowerCase();
  _slashFiltered=SLASH_COMMANDS.filter(c=>
    c.label.toLowerCase().includes(q)||c.hint.toLowerCase().includes(q)||c.t.includes(q)
  );
  if(!_slashFiltered.length){hideSlashPopup();return;}
  _slashSelIdx=Math.min(_slashSelIdx,_slashFiltered.length-1);
  renderSlashItems();
}

function showSlashPopup(el){
  let popup=document.getElementById('slash-popup');
  if(!popup){popup=document.createElement('div');popup.id='slash-popup';document.body.appendChild(popup);}
  const rect=el.getBoundingClientRect();
  popup.style.top=`${rect.bottom+4}px`;
  popup.style.left=`${rect.left}px`;
  popup.style.display='block';
  renderSlashItems();
}

function hideSlashPopup(){
  _slashState=null;_slashSelIdx=0;_slashFiltered=[];
  const p=document.getElementById('slash-popup');if(p)p.style.display='none';
}

function renderSlashItems(){
  const popup=document.getElementById('slash-popup');if(!popup)return;
  popup.innerHTML=_slashFiltered.map((c,i)=>`
    <div class="slash-item${i===_slashSelIdx?' sel':''}" onmousedown="slashPickIdx(${i})">
      <span class="slash-item-icon">${c.icon}</span>
      <span class="slash-item-label">${c.label}</span>
      <span class="slash-item-hint">${c.hint}</span>
    </div>`).join('');
}

function renderSlashSel(){
  document.querySelectorAll('.slash-item').forEach((el,i)=>el.classList.toggle('sel',i===_slashSelIdx));
}

function slashPickIdx(i){
  _slashSelIdx=i;
  const cmd=_slashFiltered[i];
  if(cmd)confirmSlashCmd(cmd);
}

function makeBlockDefaults(type,id){
  const o={type,id:id||uid()};
  if(['h1','h2','h3','heading'].includes(type))o.text='';
  else if(['bullet','numbered'].includes(type))o.items=[''];
  else if(type==='divider'){}
  else if(type==='toggle'){o.title='';o.content='';o.open=false;}
  else if(type==='checklist')o.items=[];
  else if(type==='links')o.items=[];
  else o.content='';
  return o;
}

function confirmSlashCmd(cmd){
  if(!_slashState)return;
  const {pid,idx,el}=_slashState;
  hideSlashPopup();
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  // Remove slash + query from textarea value
  const pos=el.selectionStart;
  const val=el.value||'';
  const before=val.slice(0,pos);
  const slashPos=before.lastIndexOf('/');
  const remaining=(val.slice(0,slashPos)+val.slice(pos)).trim();
  // If current block is effectively empty after removing slash query → convert it
  if(!remaining&&page.blocks[idx]){
    page.blocks[idx]=makeBlockDefaults(cmd.t,page.blocks[idx].id);
    save();render();
  }else{
    // Otherwise update block content to remove the slash query, then add new block below
    const b=page.blocks[idx];
    if(b){
      const cleanVal=val.slice(0,slashPos)+val.slice(pos);
      if(b.content!==undefined)b.content=cleanVal;else if(b.text!==undefined)b.text=cleanVal;
    }
    save();
    addBlock(pid,cmd.t,idx);
  }
}

// Close slash popup on outside click
document.addEventListener('mousedown',e=>{
  if(_slashState&&!e.target.closest('#slash-popup')&&e.target!==_slashState?.el){
    hideSlashPopup();
  }
});

function checkClientDraftTasks(){
  // 自分が担当の案件でクライアント初稿が明日のものを自動タスク化
  const changed=[];
  if(!S.tasks)S.tasks=[];
  (S.jobs||[]).filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'
    &&j.workerId===SELF_WID&&j.clientDraftDate)
  .forEach(j=>{
    if(daysUntil(j.clientDraftDate)!==1)return;
    const exists=S.tasks.find(t=>t.sourceJobId===j.id&&t.taskType==='clientDraft'&&!t.deleted);
    if(!exists){
      S.tasks.push({id:uid(),title:`📋 クライアント初稿提出: ${j.title}`,dueDate:j.clientDraftDate,
        sourceJobId:j.id,taskType:'clientDraft',done:false,createdAt:new Date().toISOString()});
      changed.push(j.title);
    }
  });
  // サムネイル納品が2日前のものを自動タスク化
  (S.jobs||[]).filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'
    &&j.workerId===SELF_WID&&j.thumbnailDate)
  .forEach(j=>{
    if(daysUntil(j.thumbnailDate)!==2)return;
    const exists=S.tasks.find(t=>t.sourceJobId===j.id&&t.taskType==='thumbnail'&&!t.deleted);
    if(!exists){
      S.tasks.push({id:uid(),title:`🖼 サムネイル納品: ${j.title}`,dueDate:j.thumbnailDate,
        sourceJobId:j.id,taskType:'thumbnail',done:false,createdAt:new Date().toISOString()});
      changed.push(j.title+'（サムネイル）');
    }
  });
  if(changed.length){save();toast(`📋 ${changed.length}件の案件をタスクに自動追加しました`);}
}

function checkDeadlineReminders(){
  const td=today();
  const d=new Date();d.setDate(d.getDate()+1);
  const tm=d.toISOString().slice(0,10);
  const items=[];
  S.tasks.filter(t=>!t.deleted&&!t.done&&(t.dueDate===td||t.dueDate===tm)).forEach(t=>items.push({title:t.title,date:t.dueDate,type:'タスク'}));
  S.jobs.filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'&&(j.deliveryDate===td||j.deliveryDate===tm)).forEach(j=>items.push({title:j.title,date:j.deliveryDate,type:'案件'}));
  if(!items.length)return;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  items.forEach(it=>{
    new Notification(`📅 EditFlow 納期リマインダー`,{body:`${it.type}「${it.title}」の期限: ${it.date===td?'今日':'明日'}(${it.date})`});
  });
}
function initReminders(){
  if(typeof Notification!=='undefined'&&Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted')checkDeadlineReminders();});
  }else{
    checkDeadlineReminders();
  }
}

function syncToGoogleCal(){

  toast('Google Calendar同期は準備中です','warn');
}
// ===INIT===
updSessionCount();
initPomo();
initReminders();
checkClientDraftTasks();
render();

// ===VERSION CHECK & AUTO-UPDATE===
const APP_VERSION='20260518-6';
function forceAppUpdate(){
  const bust='?v='+Date.now();
  if('caches' in window){
    caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))).then(()=>{
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(regs=>Promise.all(regs.map(r=>r.unregister()))).then(()=>{
          location.href=location.pathname+bust; // キャッシュバスティングURLで再読み込み
        });
      }else{location.href=location.pathname+bust;}
    });
  }else{location.href=location.pathname+bust;}
}
(function(){
  const stored=localStorage.getItem('ef_app_ver');
  if(stored!==APP_VERSION){
    localStorage.setItem('ef_app_ver',APP_VERSION);
    if(stored){
      // ループ防止: sessionStorageで試行回数を管理
      const attempts=parseInt(sessionStorage.getItem('ef_update_attempts')||'0');
      if(attempts<3){
        sessionStorage.setItem('ef_update_attempts',String(attempts+1));
        forceAppUpdate();
      }else{
        // 3回試みても解決しない場合はループを止める
        sessionStorage.removeItem('ef_update_attempts');
        console.warn('Update loop detected, skipping forceAppUpdate');
      }
    }
  }else{
    sessionStorage.removeItem('ef_update_attempts');
  }
})();

// ===SERVICE WORKER===
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/editflow-app/sw.js').then(reg=>{
    reg.update();
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(sessionStorage.getItem('sw_init')){
        sessionStorage.removeItem('sw_init');
        location.reload();
      }else{
        sessionStorage.setItem('sw_init','1');
      }
    });
  }).catch(e=>console.warn('SW:',e));
}
