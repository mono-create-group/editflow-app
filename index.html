<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EditFlow">
<meta name="theme-color" content="#7c3aed">
<link rel="manifest" href="/editflow-app/manifest.json">
<title>EditFlow — クリエイター専用管理アプリ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;--surface:#17171c;--card:#1f1f26;--card2:#252530;--border:#2a2a34;
  --purple:#7c3aed;--pl:#9d5cf5;--pdim:#7c3aed22;
  --green:#10b981;--gdim:#10b98120;
  --amber:#f59e0b;--adim:#f59e0b20;
  --red:#ef4444;--rdim:#ef444420;
  --blue:#3b82f6;--bdim:#3b82f620;
  --pink:#ec4899;--pkdim:#ec489920;
  --cyan:#06b6d4;--cdim:#06b6d420;
  --text:#e8e8f0;--t2:#9898a8;--t3:#55556a;
  --r:12px;--rs:8px;--shadow:0 4px 24px rgba(0,0,0,.45);
}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Yu Gothic',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;display:flex}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea,select{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font:inherit;padding:8px 12px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:72px}
select option{background:var(--card)}
a{color:inherit;text-decoration:none}

/* ─── LAYOUT ─── */
#sidebar{width:210px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:sticky;top:0;flex-shrink:0;overflow-y:auto;scrollbar-width:none}
#main{flex:1;overflow-y:auto;padding:28px 32px;max-width:960px}
.logo{padding:0 18px 20px;font-size:17px;font-weight:700;color:var(--pl)}
.logo small{display:block;font-size:11px;color:var(--t2);font-weight:400;margin-top:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;color:var(--t2);font-size:13px;cursor:pointer;transition:all .15s;border-right:3px solid transparent;user-select:none}
.nav-item:hover{color:var(--text);background:var(--card)}
.nav-item.active{color:var(--pl);background:var(--pdim);border-right-color:var(--purple)}
.nav-drag-handle{font-size:14px;color:var(--t3);opacity:0;cursor:grab;flex-shrink:0;line-height:1;margin-right:-4px;transition:opacity .15s}
.nav-item:hover .nav-drag-handle{opacity:1}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-sep{height:1px;background:var(--border);margin:10px 14px}

/* ─── POMODORO MINI ─── */
#pomo-mini{margin:auto 14px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
#pomo-display{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:2px}
.pomo-lbl{font-size:11px;color:var(--t2);margin-bottom:6px}
.pomo-task-name{font-size:11px;color:var(--pl);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pomo-btns{display:flex;gap:6px;justify-content:center;margin-top:8px}
.pbtn{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;transition:all .15s}
.pbtn.go{background:var(--purple);color:#fff}.pbtn.go:hover{background:var(--pl)}
.pbtn.st{border:1px solid var(--border);color:var(--t2)}.pbtn.st:hover{color:var(--red)}
.pomo-sessions{font-size:11px;color:var(--t3);margin-top:4px}

/* ─── PAGE HEADER ─── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.ph-title{font-size:20px;font-weight:700}
.ph-title small{font-size:13px;color:var(--t2);font-weight:400;margin-left:8px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;border:none}
.btn-p{background:var(--purple);color:#fff}.btn-p:hover{background:var(--pl)}
.btn-g{color:var(--t2);border:1px solid var(--border)}.btn-g:hover{color:var(--text)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-red{color:var(--red)}.btn-red:hover{background:var(--rdim)}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card-sm{padding:12px 14px}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.bp{background:var(--pdim);color:var(--pl)}
.br{background:var(--rdim);color:var(--red)}
.ba{background:var(--adim);color:var(--amber)}
.bg{background:var(--gdim);color:var(--green)}
.bb{background:var(--bdim);color:var(--blue)}
.bc{background:var(--cdim);color:var(--cyan)}
.bk{background:var(--border);color:var(--t2)}
.bpk{background:var(--pkdim);color:var(--pink)}

/* ─── STATS GRID ─── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--t2);margin-top:3px}
.stat-card.cp{border-color:var(--purple);background:var(--pdim)}
.stat-card.cg{border-color:var(--green);background:var(--gdim)}
.stat-card.ca{border-color:var(--amber);background:var(--adim)}
.stat-card.cr{border-color:var(--red);background:var(--rdim)}

/* ─── FROG BANNER ─── */
#frog-banner{background:linear-gradient(135deg,#2d1b69,#1a1a2e);border:1px solid var(--purple);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px}
.frog-ico{font-size:30px;flex-shrink:0}
.frog-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--pl);font-weight:700}
.frog-name{font-size:15px;font-weight:600;margin-top:2px}
.frog-name.empty{color:var(--t2);font-weight:400;font-size:13px}

/* ─── IDENTITY CARD ─── */
.identity-card{background:linear-gradient(135deg,#0d0d20,#1a1030);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;cursor:pointer}
.identity-card:hover{border-color:var(--purple)}
.identity-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.identity-text{font-size:15px;font-weight:600;color:var(--pl);margin-top:3px}
.identity-text.empty{color:var(--t3);font-weight:400;font-size:13px}

/* ─── PROCRASTINATION PANEL ─── */
.procra-panel{background:var(--adim);border:1px solid var(--amber);border-radius:var(--r);padding:14px 16px;margin-bottom:18px}
.procra-title{font-size:12px;font-weight:700;color:var(--amber);margin-bottom:6px}
.procra-tip{font-size:12px;color:var(--t2);margin-top:6px;padding-top:6px;border-top:1px solid var(--adim)}

/* ─── REVENUE BAR ─── */
.rev-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:18px}
.rev-amount{font-size:28px;font-weight:700;color:var(--green)}
.rev-target{font-size:12px;color:var(--t2);margin-top:2px}
.rev-remaining{font-size:13px;font-weight:600;color:var(--amber);margin-top:6px}
.prog-wrap{background:var(--border);border-radius:100px;height:6px;margin:8px 0;overflow:hidden}
.prog-bar{height:100%;border-radius:100px;background:var(--purple);transition:width .4s}
.prog-bar.done{background:var(--green)}

/* ─── TASK ITEMS ─── */
.task-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:11px;transition:border-color .2s;position:relative}
.task-item:hover{border-color:var(--t3)}
.task-item.frog{border-left:3px solid var(--purple)}
.task-item.overdue{border-left:3px solid var(--red)}
.task-item.done-item{opacity:.45}
.task-item.high-proc{border-left:3px solid var(--amber)}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk:hover{border-color:var(--purple)}
.chk.done{background:var(--green);border-color:var(--green)}
.chk.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.chk.fail{background:var(--red);border-color:var(--red)}
.chk.fail::after{content:'✕';color:#fff;font-size:11px;font-weight:700}
.task-body{flex:1;min-width:0}
.task-ttl{font-weight:500;word-break:break-word}
.task-ttl.done{text-decoration:line-through;color:var(--t2)}
.task-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
.task-acts{display:flex;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task-item:hover .task-acts{opacity:1}
.tact{padding:4px 7px;border-radius:6px;font-size:12px;color:var(--t2);transition:all .15s}
.tact:hover{color:var(--text);background:var(--border)}
.tact.del:hover{color:var(--red);background:var(--rdim)}
.proc-count{font-size:11px;color:var(--amber);background:var(--adim);padding:1px 6px;border-radius:100px;font-weight:700}
.subtask-list{margin-top:8px;display:flex;flex-direction:column;gap:4px;padding-left:2px}
.sub-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t2)}
.sub-chk{width:15px;height:15px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sub-chk:hover{border-color:var(--purple)}
.sub-chk.done{background:var(--green);border-color:var(--green)}
.sub-chk.done::after{content:'✓';color:#fff;font-size:9px;font-weight:700}

/* ─── WEEK CALENDAR ─── */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.week-nav span{font-size:14px;font-weight:600;flex:1;text-align:center}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.wday-col{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;min-height:120px}
.wday-col.today-col{border-color:var(--purple);background:var(--pdim)}
.wday-hdr{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--t2);text-align:center}
.wday-date{font-size:18px;font-weight:700;text-align:center;margin:2px 0 8px;line-height:1}
.wday-col.today-col .wday-date{color:var(--pl)}
.wtask{font-size:11px;padding:3px 6px;background:var(--pdim);border-radius:4px;margin-bottom:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wtask.done{opacity:.5;text-decoration:line-through}
.wtask.red{background:var(--rdim);color:var(--red)}
.wtask .del-btn{opacity:0;transition:opacity .15s}
.wtask:hover .del-btn{opacity:1}
.add-day-btn{font-size:11px;color:var(--t3);padding:2px 4px;margin-top:4px;border-radius:4px;width:100%;text-align:center}
.add-day-btn:hover{color:var(--pl);background:var(--pdim)}

/* ─── MONTH CALENDAR ─── */
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.month-nav span{font-size:15px;font-weight:700;flex:1;text-align:center}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.month-dow{font-size:11px;font-weight:700;color:var(--t3);text-align:center;padding:4px 0}
.mday{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:6px;min-height:80px;cursor:pointer;transition:border-color .15s}
.mday:hover{border-color:var(--t3)}
.mday.today-day{border-color:var(--purple);background:var(--pdim)}
.mday.empty{background:transparent;border-color:transparent;cursor:default}
.mday-num{font-size:12px;font-weight:600;line-height:1}
.mday.today-day .mday-num{color:var(--pl)}
.mday-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}
.mdot{width:6px;height:6px;border-radius:50%;background:var(--purple);flex-shrink:0}
.mdot.red{background:var(--red)}
.mday-task{font-size:10px;margin-top:2px;padding:1px 4px;border-radius:3px;background:var(--pdim);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.mday-task.over{background:var(--rdim);color:var(--red)}
.mday-task.done-t{opacity:.45;text-decoration:line-through}
.mday-more{font-size:10px;color:var(--t3);margin-top:2px;padding-left:2px}
.wtask.drag-over{border:1.5px dashed var(--purple);background:var(--pdim)}
.fs-drop-zone.fs-drag-over{outline:2px dashed var(--purple);outline-offset:-2px;background:var(--pdim)!important}

/* ─── TIME SCHEDULE ─── */
.sched-wrap{display:flex;gap:0;margin-top:8px;overflow-y:auto;max-height:75vh}
.sched-hours{width:48px;flex-shrink:0;position:relative}
.sched-main{flex:1;position:relative;border-left:1px solid var(--border)}
.hlabel{position:absolute;right:6px;font-size:10px;color:var(--t3);transform:translateY(-50%)}
.hline{position:absolute;left:0;right:0;height:1px;background:var(--border)}
.hline-half{position:absolute;left:0;right:0;height:1px;border-top:1px dashed var(--border);opacity:.4}
.fixed-blk{position:absolute;left:0;right:0;border-radius:4px;padding:3px 7px;font-size:11px;overflow:hidden;border-left:3px solid;opacity:.85}
.fixed-blk-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fixed-blk-time{font-size:10px;opacity:.7}
.task-blk{position:absolute;left:52%;right:4px;border-radius:6px;padding:4px 7px;font-size:11px;font-weight:600;overflow:hidden;background:var(--purple);color:#fff;cursor:pointer;z-index:10;min-height:20px}
.task-blk.done-blk{opacity:.5;text-decoration:line-through}
.task-blk.overlap-blk{background:linear-gradient(135deg,#f59e0b,#d97706);border:1.5px solid #fcd34d;box-shadow:0 0 0 1.5px #f59e0b40,2px 2px 6px rgba(0,0,0,.25)}
.overlap-badge{position:absolute;top:2px;right:3px;background:rgba(0,0,0,.35);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:6px;line-height:1.4;pointer-events:none}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:20;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;background:var(--red);border-radius:50%}
.sched-add-hint{font-size:11px;color:var(--t3);text-align:center;margin-top:8px}
/* ─── SCHEDULE SIDE PANEL ─── */
.sched-layout{display:flex;gap:12px;align-items:flex-start}
.sched-side-panel{width:236px;flex-shrink:0;border:1px solid var(--border);border-radius:var(--rs);background:var(--card);overflow-y:auto;max-height:75vh;min-height:120px;transition:border-color .15s,box-shadow .15s}
.sched-side-panel.drag-over{border-color:var(--purple);background:var(--pdim);box-shadow:0 0 0 2px var(--purple)40}
.sched-side-hdr{font-size:12px;font-weight:700;color:var(--t2);padding:8px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:2;display:flex;align-items:center;justify-content:space-between}
/* タスクアイテム */
.sched-side-task{margin:6px 6px 2px;padding:8px 9px 8px 7px;border-radius:8px;background:var(--card2);border:1px solid var(--border);cursor:grab;font-size:12px;font-weight:600;color:var(--text);transition:background .15s,border-color .15s,box-shadow .15s;user-select:none;display:flex;align-items:flex-start;gap:6px}
.sched-side-task:hover{background:var(--pdim);border-color:var(--purple);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.sched-side-task.dragging{opacity:.3;cursor:grabbing;box-shadow:none}
.sched-side-task.done-side{opacity:.45}
/* サブタスクアイテム */
.sched-side-sub{margin:0 6px 4px 20px;padding:6px 9px 6px 7px;border-radius:6px;background:var(--surface);border:1px solid var(--border);cursor:grab;font-size:11px;font-weight:500;color:var(--t2);transition:background .15s,border-color .15s,box-shadow .15s;user-select:none;display:flex;align-items:center;gap:6px;position:relative}
.sched-side-sub::before{content:'';position:absolute;left:-11px;top:50%;width:8px;height:1px;background:var(--border)}
.sched-side-sub:hover{background:var(--pdim);border-color:var(--purple);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.08)}
.sched-side-sub.dragging{opacity:.3;cursor:grabbing}
.sched-side-sub.done-sub{opacity:.4;text-decoration:line-through}
/* ドラッグハンドル */
.sched-dh{color:var(--t3);font-size:12px;line-height:1;flex-shrink:0;margin-top:1px;letter-spacing:-1px}
/* タイムラインのサブタスクブロック */
.sub-blk{background:linear-gradient(135deg,#7c3aedcc,#6d28d9aa)!important;border-left:2px solid #a78bfa!important;font-size:10px!important}
.sub-blk-label{font-size:9px;opacity:.75;line-height:1;margin-bottom:1px}
.sched-col{flex:1;min-width:0}
@media(max-width:700px){.sched-layout{flex-direction:column}.sched-side-panel{width:100%;max-height:220px}}

/* ─── PROJECT BOARD ─── */
.board-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.board-col{min-width:220px;max-width:240px;flex-shrink:0}
.board-col-hdr{font-size:12px;font-weight:700;padding:8px 12px;border-radius:var(--rs);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:7px;cursor:pointer;transition:all .2s}
.proj-card:hover{border-color:var(--purple);transform:translateY(-1px);box-shadow:var(--shadow)}
.proj-card-title{font-weight:600;font-size:13px;margin-bottom:4px}
.proj-card-client{font-size:11px;color:var(--t2)}
.proj-card-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.proj-profit{font-size:16px;font-weight:700;color:var(--green);margin-top:4px}
.proj-due-label{font-size:11px;color:var(--t2);margin-top:4px}
.proj-due-label.urgent{color:var(--red)}
.proj-due-label.soon{color:var(--amber)}

/* ─── CLIENT LIST ─── */
.client-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.client-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.client-name{font-size:16px;font-weight:700}
.job-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--card2);border-radius:var(--rs);margin-bottom:5px;cursor:pointer;transition:border-color .15s;border:1px solid transparent}
.job-item:hover{border-color:var(--border)}
.job-title{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.job-dates{font-size:11px;color:var(--t2)}

/* ─── HABIT ITEMS ─── */
.habit-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:9px}
.habit-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.habit-name{font-weight:600;font-size:14px}
.streak-badge{font-size:13px;font-weight:700;color:var(--amber);display:flex;align-items:center;gap:3px}
.streak-risk{font-size:11px;color:var(--red);font-weight:700;background:var(--rdim);padding:2px 7px;border-radius:100px}
.habit-week{display:flex;gap:4px}
.hday{width:34px;height:34px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .15s;flex-direction:column;flex-shrink:0}
.hday:hover{border-color:var(--purple)}
.hday.done{background:var(--gdim);border-color:var(--green);color:var(--green)}
.hday.done::after{content:'✓';font-size:12px}
.hday.done span{display:none}
.hday.fail{background:var(--rdim);border-color:var(--red);color:var(--red)}
.hday.fail::after{content:'✕';font-size:12px}
.hday.fail span{display:none}
.hday.today-h{border-color:var(--purple)}
.hday.future-h{cursor:default;opacity:.35}
.habit-meta{font-size:11px;color:var(--t2);display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

/* ─── HABIT TIME SCHEDULE ─── */
.habit-sched-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.habit-time-badge{font-size:13px;font-weight:700;color:var(--purple);background:var(--pdim);padding:4px 10px;border-radius:var(--rs);flex-shrink:0;min-width:60px;text-align:center}
.habit-sched-info{flex:1}
.habit-sched-name{font-weight:600}
.habit-sched-days{font-size:11px;color:var(--t2);margin-top:2px}

/* ─── GOALS ─── */
.goal-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:11px}
.goal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.goal-title{font-size:15px;font-weight:600}
.ms-item{display:flex;align-items:center;gap:7px;padding:5px 0;font-size:13px;color:var(--t2)}
.ms-chk{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ms-chk:hover{border-color:var(--purple)}
.ms-chk.done{background:var(--purple);border-color:var(--purple)}
.ms-chk.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.ms-text.done{text-decoration:line-through;color:var(--t3)}
.ms-move{color:var(--t3);padding:2px 5px;border-radius:4px;font-size:13px;cursor:pointer;line-height:1}
.ms-move:hover{color:var(--text);background:var(--border)}
.rev-remaining-box{background:var(--adim);border:1px solid var(--amber);border-radius:var(--rs);padding:10px 12px;margin-top:10px;font-size:13px}
.rev-remaining-box strong{color:var(--amber)}

/* ─── JOURNAL ─── */
.journal-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.jcal-day{text-align:center;padding:5px 3px;font-size:12px;border-radius:var(--rs);cursor:pointer;transition:all .15s;border:1px solid transparent}
.jcal-day:hover{border-color:var(--border)}
.jcal-day.has-entry{background:var(--pdim);color:var(--pl);border-color:var(--purple)}
.jcal-day.selected{background:var(--purple);color:#fff;border-color:var(--purple)}
.jcal-day.today-j{font-weight:700}
.mood-row{display:flex;gap:8px;flex-wrap:wrap}
.mood-btn{font-size:22px;padding:6px;border-radius:var(--rs);border:2px solid var(--border);cursor:pointer;transition:all .15s;line-height:1}
.mood-btn:hover,.mood-btn.sel{border-color:var(--purple);background:var(--pdim);transform:scale(1.1)}
.energy-row{display:flex;gap:6px;align-items:center}
.energy-btn{width:32px;height:32px;border-radius:var(--rs);border:2px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.energy-btn:hover,.energy-btn.sel{border-color:var(--purple);background:var(--pdim);color:var(--pl)}

/* ─── REVENUE LOG ─── */
.log-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.log-date{font-size:12px;color:var(--t2);min-width:80px}
.log-amount{font-size:16px;font-weight:700;color:var(--green);flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-title{font-size:13px;font-weight:500}
.log-note{font-size:11px;color:var(--t2)}

/* ─── SETTINGS ─── */
.sched-edit-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.sched-edit-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.day-check-row{display:flex;gap:6px;flex-wrap:wrap}
.day-cb{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:100px;cursor:pointer;transition:all .15s;user-select:none}
.day-cb input{display:none}
.day-cb.sel{background:var(--pdim);border-color:var(--purple);color:var(--pl)}

/* ─── MORNING CHECKIN BANNER ─── */
.checkin-banner{background:linear-gradient(135deg,#1a0a30,#0a1a30);border:1px solid var(--purple);border-radius:var(--r);padding:16px 18px;margin-bottom:18px}
.checkin-title{font-size:13px;font-weight:700;color:var(--pl);margin-bottom:10px}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-lg{max-width:660px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mtitle{font-size:16px;font-weight:700}
.mclose{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px}
.mclose:hover{background:var(--border);color:var(--text)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fhint{font-size:11px;color:var(--t3);margin-top:3px}
.mfooter{display:flex;gap:7px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.postpone-list{display:flex;flex-direction:column;gap:6px}
.postpone-opt{padding:9px 13px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;font-size:13px;transition:all .15s}
.postpone-opt:hover{border-color:var(--purple);color:var(--pl)}
.compassion-msg{background:var(--bdim);border:1px solid var(--blue);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--t2);margin-top:12px}

/* ─── FILTER BAR ─── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fbtn{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid var(--border);color:var(--t2);transition:all .15s;cursor:pointer}
.fbtn:hover,.fbtn.act{background:var(--pdim);border-color:var(--purple);color:var(--pl)}

/* ─── SUB VIEW TABS ─── */
.sub-tabs{display:flex;gap:2px;background:var(--card);border-radius:var(--rs);padding:3px;margin-bottom:16px;width:fit-content}
.stab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s}
.stab.act{background:var(--purple);color:#fff}
.stab:hover:not(.act){color:var(--text)}

/* ─── SECTION TITLE ─── */
.section-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);margin-bottom:10px;margin-top:18px}
.section-ttl:first-child{margin-top:0}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:44px 20px;color:var(--t2)}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}

/* ─── TOAST ─── */
#toast{position:fixed;bottom:22px;right:22px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 16px;font-size:13px;box-shadow:var(--shadow);z-index:9999;transform:translateY(70px);opacity:0;transition:all .3s;max-width:280px}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.warn{border-color:var(--amber);color:var(--amber)}
#toast.err{border-color:var(--red);color:var(--red)}

/* ─── CELEBRATION ─── */
@keyframes celebrate{0%{transform:scale(1)}25%{transform:scale(1.4) rotate(-5deg)}50%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1)}}
.celebrating{animation:celebrate .4s ease}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── TWO COL ─── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
/* ─── HAMBURGER & DRAWER ─── */
/* NOTE: base styles must come BEFORE the media query so @media can override display */
#mob-hamburger{
  display:none;position:fixed;
  top:calc(env(safe-area-inset-top) + 10px);
  left:12px;
  z-index:300;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;width:40px;height:40px;
  align-items:center;justify-content:center;cursor:pointer;
  flex-direction:column;gap:5px;padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.15)
}
#mob-hamburger span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px;transition:all .2s}
/* ─── MOBILE LAYOUT + SAFE AREA ─── */
@media(max-width:700px){
  .two-col{grid-template-columns:1fr}
  .frow{grid-template-columns:1fr}
  #sidebar{display:none}
  #main{
    padding:14px;
    /* ノッチ・Dynamic Island の分だけ上に余白 */
    padding-top:calc(env(safe-area-inset-top) + 56px);
    /* 下タブバー + ホームインジケーター分 */
    padding-bottom:calc(env(safe-area-inset-bottom) + 70px);
  }
  #mob-nav{display:flex}
  #mob-hamburger{display:flex}
}
#mob-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);z-index:100;
  /* ホームインジケーター分の余白 */
  padding-bottom:env(safe-area-inset-bottom);
}
.mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;font-size:10px;color:var(--t2);cursor:pointer;gap:3px}
.mnav-item.active{color:var(--pl)}
.mnav-item .nav-icon{font-size:18px}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;transition:opacity .2s}
#mob-overlay.open{display:block;opacity:1}
#mob-drawer{
  position:fixed;top:0;left:0;bottom:0;width:260px;
  background:var(--surface);border-right:1px solid var(--border);
  z-index:250;transform:translateX(-100%);
  transition:transform .25s ease;
  display:flex;flex-direction:column;
  /* ドロワー内もsafe-area対応 */
  padding-top:calc(env(safe-area-inset-top) + 20px);
  padding-bottom:calc(env(safe-area-inset-bottom) + 20px);
  overflow-y:auto
}
#mob-drawer.open{transform:translateX(0)}
.woop-section{background:var(--card2);border-radius:var(--rs);padding:12px;margin-top:12px}
.woop-label{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.woop-text{font-size:13px;color:var(--t2)}
.inline-input{background:none;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:3px 0;font-size:inherit;width:auto;color:var(--text)}
.inline-input:focus{border-bottom-color:var(--purple)}

/* ─── DRAG & DROP ─── */
.task-item[draggable]{cursor:grab}
.task-item.drag-over{border:2px dashed var(--purple);background:var(--pdim)}
.task-item.dragging{opacity:.4}
.task-blk[draggable]{cursor:grab}
.drop-zone{position:absolute;left:0;right:0;height:30px;z-index:5;transition:background .1s}
.drop-zone.drag-over{background:var(--pdim);border:2px dashed var(--purple);border-radius:4px}

/* ─── MEMO / BRAIN DUMP ─── */
.memo-capture{background:var(--card);border:2px solid var(--purple);border-radius:var(--r);padding:16px;margin-bottom:16px}
.memo-capture textarea{min-height:90px;font-size:15px;border:none;background:transparent;padding:0;resize:none}
.memo-capture textarea:focus{border:none;outline:none}
.memo-item{background:var(--card);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border)}
.memo-item.pinned{border-color:var(--amber)}
.memo-item-text{flex:1;font-size:13px;white-space:pre-wrap;line-height:1.6}
.memo-item-text.done{text-decoration:line-through;color:var(--t3)}
.memo-acts{display:flex;gap:4px;flex-shrink:0}
.memo-cat{font-size:10px;padding:2px 7px;border-radius:100px;background:var(--card2);color:var(--t2);margin-top:3px;display:inline-block}

/* ─── REVENUE TABS ─── */
.rev-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.rev-tab{padding:6px 14px;border-radius:100px;font-size:13px;font-weight:600;background:var(--card);color:var(--t2);cursor:pointer;border:1px solid var(--border);transition:all .15s}
.rev-tab.act{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ─── PROFIT / PAYMENT PAGES ─── */
.profit-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.profit-row:last-child{border-bottom:none}
.profit-total{font-size:18px;font-weight:700;color:var(--green)}
.profit-neg{color:var(--red)}
.payment-row{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.pmt-worker{font-weight:600;min-width:80px}
.pmt-amount{color:var(--amber);font-weight:700}

/* ─── WORKERS ─── */
.worker-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--card2);border:1px solid var(--border);border-radius:100px;font-size:12px;margin:2px}

/* ─── JOB SUBTASK ─── */
.job-sub-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.job-sub-item:last-child{border:none}

/* ─── NO-CODE CUSTOMIZE ─── */
.cust-nav-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;transition:opacity .15s,border-color .15s;user-select:none}
.cust-nav-row:hover{border-color:var(--purple)}
.cust-nav-row.hidden-row{opacity:.38}
.drag-handle{color:var(--t3);font-size:18px;cursor:grab;flex-shrink:0;line-height:1}
.toggle-sw{width:38px;height:22px;background:var(--border);border-radius:100px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--purple)}
.toggle-sw::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}
.toggle-sw.on::after{transform:translateX(16px)}
.cp-card{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.cp-card:hover{border-color:var(--purple)}
.block-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;margin-bottom:8px}
.block-type-tag{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.block-add-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.icon-pick{font-size:22px;cursor:pointer;padding:4px 5px;border-radius:6px;border:2px solid transparent;display:inline-block;line-height:1.2;transition:border-color .1s}
.icon-pick.sel{border-color:var(--purple)}
.cpb{margin-bottom:14px}
.cpb-heading{font-size:21px;font-weight:700;border-bottom:1px solid var(--border);padding-bottom:8px}
.cpb-heading-input{font-size:21px;font-weight:700;width:100%;border:none;background:transparent;color:var(--text);padding:0 0 8px;border-bottom:1px solid var(--border);outline:none;box-sizing:border-box}
.cpb-heading-input::placeholder{color:var(--t3)}
.cpb-text{font-size:13px;color:var(--t2);white-space:pre-wrap;line-height:1.75}
.cpb-text-input{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;line-height:1.75;resize:none;outline:none;box-sizing:border-box;min-height:60px;font-family:inherit}
.cpb-text-input::placeholder{color:var(--t3)}
.cpb-note{background:var(--adim);border:1px solid var(--amber);border-radius:var(--rs);padding:13px 15px;font-size:13px;white-space:pre-wrap;line-height:1.75}
.cpb-note-input{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;line-height:1.75;resize:none;outline:none;box-sizing:border-box;min-height:60px;padding:13px 15px;font-family:inherit;border-radius:var(--rs)}
.cpb-note-input::placeholder{color:var(--t3)}
.cpb-counter{text-align:center;padding:18px 0}
.cpb-counter-val{font-size:60px;font-weight:700;color:var(--pl);line-height:1}
.cpb-counter-lbl{font-size:12px;color:var(--t2);margin-top:5px}
.cpb-counter-btns{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:14px}
.cpb-check-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.cpb-check-item:last-child{border:none}
.cpb-link-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.cpb-link-item:last-child{border:none}
.cpb-link-a{color:var(--blue);text-decoration:underline;font-size:13px;word-break:break-all}

/* ─── JOURNAL TABS ─── */
.j-tab-active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ─── NOTION BLOCK TYPES ─── */
.cpb-h1{font-size:28px;font-weight:800;line-height:1.2;padding:4px 0 6px;border-bottom:2px solid var(--border);margin-bottom:4px;color:var(--text)}
.cpb-h2{font-size:22px;font-weight:700;line-height:1.3;padding:3px 0 5px;border-bottom:1px solid var(--border);margin-bottom:2px;color:var(--text)}
.cpb-h3{font-size:17px;font-weight:600;line-height:1.4;padding:2px 0 4px;color:var(--text)}
.cpb-h-input{width:100%;border:none;background:transparent;color:var(--text);font-family:inherit;outline:none;padding:2px 0;box-sizing:border-box}
.cpb-h-input::placeholder{color:var(--t3)}
.cpb-h1-input{font-size:28px;font-weight:800}
.cpb-h2-input{font-size:22px;font-weight:700}
.cpb-h3-input{font-size:17px;font-weight:600}
.cpb-bullet,.cpb-numbered{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.cpb-bullet-input,.cpb-numbered-input{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;line-height:1.75;resize:none;outline:none;box-sizing:border-box;font-family:inherit}
.cpb-bullet-input::placeholder,.cpb-numbered-input::placeholder{color:var(--t3)}
.cpb-bullet-lines,.cpb-numbered-lines{display:flex;flex-direction:column;gap:2px}
.cpb-bullet-line,.cpb-numbered-line{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.75}
.cpb-bullet-line::before{content:'•';color:var(--pl);flex-shrink:0;margin-top:1px}
.cpb-numbered-line-num{color:var(--pl);flex-shrink:0;font-weight:600;min-width:18px}
.cpb-quote{border-left:4px solid var(--purple);padding:10px 16px;background:var(--pdim);border-radius:0 var(--rs) var(--rs) 0;font-style:italic;color:var(--t2);font-size:14px;line-height:1.75}
.cpb-quote-input{width:100%;border:none;background:transparent;color:var(--text);font-size:14px;font-style:italic;line-height:1.75;resize:none;outline:none;box-sizing:border-box;font-family:inherit}
.cpb-quote-input::placeholder{color:var(--t3)}
.cpb-divider{padding:12px 0}
.cpb-divider hr{border:none;border-top:2px solid var(--border);margin:0}
.cpb-toggle{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cpb-toggle-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;user-select:none;font-weight:600}
.cpb-toggle-arrow{font-size:11px;color:var(--t2);transition:transform .2s;flex-shrink:0}
.cpb-toggle-arrow.open{transform:rotate(90deg)}
.cpb-toggle-body{padding:10px 14px 14px 36px;font-size:13px;color:var(--t2);white-space:pre-wrap;line-height:1.75;border-top:1px solid var(--border)}
.cpb-toggle-input{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;line-height:1.75;resize:none;outline:none;box-sizing:border-box;font-family:inherit;min-height:60px}
.cpb-code{background:#1a1a2e;border:1px solid #2d2d4e;border-radius:var(--rs);padding:14px 16px;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:12.5px;color:#a8b4d8;white-space:pre;overflow-x:auto;line-height:1.7}

.cpb-code-input::placeholder{color:#555570}

/* ─── BLOCK DRAG & DROP ─── */
.notion-block-wrap{position:relative;display:flex;align-items:flex-start;gap:6px;padding:2px 0;transition:opacity .15s}
.notion-block-wrap.dragging-block{opacity:.35}
.notion-block-wrap.drag-over-block{border-top:2px solid var(--purple)}
.block-drag-handle{color:var(--t3);font-size:16px;cursor:grab;flex-shrink:0;padding:6px 2px;opacity:0;transition:opacity .15s;line-height:1;user-select:none;margin-top:2px;border-radius:4px}
.block-drag-handle:hover{background:var(--border);color:var(--text)}
.notion-block-wrap:hover .block-drag-handle{opacity:1}
.notion-block-wrap .cpb{flex:1;margin-bottom:0}
.notion-block-wrap .cpb-h1,.notion-block-wrap .cpb-h2,.notion-block-wrap .cpb-h3{flex:1}

/* ─── SLASH COMMAND POPUP ─── */
#slash-popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:9990;min-width:240px;max-height:340px;overflow-y:auto;padding:6px}
.slash-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;transition:background .1s}
.slash-item:hover,.slash-item.sel{background:var(--pdim);color:var(--pl)}
.slash-item-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.slash-item-label{flex:1}
.slash-item-hint{font-size:11px;color:var(--t3)}

/* ─── WORKER CARDS ─── */
.worker-page-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}

/* ─── PRIORITY TABLE ─── */
.priority-table th{position:sticky;top:0;background:var(--card2)}

/* ─── AI CHAT ─── */
.ai-model-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ai-model-tab{padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--t2);font-size:13px;cursor:pointer;transition:all .15s;font-weight:600}
.ai-model-tab:hover{border-color:var(--purple);color:var(--text)}
.ai-model-tab.active{color:#fff;border-color:transparent}
.ai-msgs{display:flex;flex-direction:column;gap:12px;margin-bottom:100px}
.ai-msg{max-width:88%;display:flex;flex-direction:column;gap:3px}
.ai-msg-user{align-self:flex-end;align-items:flex-end}
.ai-msg-assistant{align-self:flex-start;align-items:flex-start}
.ai-msg-meta{font-size:11px;color:var(--t3);padding:0 4px}
.ai-msg-body{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;word-break:break-word}
.ai-msg-user .ai-msg-body{background:var(--purple);color:#fff;border-bottom-right-radius:4px}
.ai-msg-assistant .ai-msg-body{background:var(--card2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
.ai-msg-body pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;overflow-x:auto;margin:8px 0;font-size:12px}
.ai-msg-body code{font-family:monospace;background:rgba(255,255,255,.12);padding:1px 5px;border-radius:4px;font-size:12px}
.ai-msg-body pre code{background:none;padding:0}
.ai-msg-body ul,.ai-msg-body ol{padding-left:18px;margin:6px 0}
.ai-msg-body li{margin-bottom:3px}

.ai-typing{display:flex;gap:5px;align-items:center;padding:12px 16px}
.ai-typing span{width:7px;height:7px;background:var(--t3);border-radius:50%;animation:aibounce 1.2s infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes aibounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.ai-input-bar{position:fixed;bottom:0;left:210px;right:0;padding:10px 16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;z-index:90}
@media(max-width:700px){.ai-input-bar{left:0;bottom:calc(env(safe-area-inset-bottom) + 60px);padding:8px 12px}}
.ai-input-bar textarea{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:14px;background:var(--card);color:var(--text);resize:none;max-height:120px;min-height:42px;outline:none;font-family:inherit;line-height:1.4}
.ai-input-bar textarea:focus{border-color:var(--purple)}
.ai-ctx-bar{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ai-ctx-tag{background:var(--pdim);border:1px solid var(--purple);color:var(--pl);border-radius:99px;padding:2px 10px;font-size:11px;font-weight:600}

<script>
// ===CONSTANTS===
const DB='ef_v5';
const BUILTIN_VIEWS=[
  {id:'dashboard',label:'ダッシュボード',icon:'🏠'},
  {id:'tasks',label:'タスク管理',icon:'✅'},
  {id:'projects',label:'案件管理',icon:'🎬'},
  {id:'workers',label:'ワーカー管理',icon:'👥'},
  {id:'habits',label:'習慣トラッカー',icon:'🔥'},
  {id:'goals',label:'目標管理',icon:'🎯'},
  {id:'journal',label:'ジャーナル',icon:'📔'},
  {id:'revenue',label:'目標達成確認',icon:'💰'},
  {id:'memo',label:'ブレインダンプ',icon:'🧠'},

  {id:'fitness',label:'フィットネス',icon:'💪'},

];

const DB_OLD='ef_v4';
const PPM=1.5, SS=7*60, SE=24*60;
const PSTATUS=['案件掲載中','未着手','進行中','編集者進行中','初稿完成','確認待ち','FB待ち','修正中','完了','キャンセル'];
const SCOL={'案件掲載中':'--cyan','未着手':'--t3','進行中':'--blue','編集者進行中':'--pink','初稿完成':'--purple','確認待ち':'--amber','FB待ち':'--pink','修正中':'--red','完了':'--green','キャンセル':'--t3'};
const SCOLBG={'案件掲載中':'bc','未着手':'bk','進行中':'bb','編集者進行中':'bpk','初稿完成':'bp','確認待ち':'ba','FB待ち':'bk','修正中':'br','完了':'bg','キャンセル':'bk'};
const DAYS=['日','月','火','水','木','金','土'];
const LOG_TYPES=['revenue','sales','hire'];

// ===FIREBASE===
firebase.initializeApp({
  apiKey:"AIzaSyAFtEqB5SvDnoMHneMTnZ4n4Abxdyuj2NQ",
  authDomain:"task-management-app-bd1b1.firebaseapp.com",
  projectId:"task-management-app-bd1b1",
  storageBucket:"task-management-app-bd1b1.firebasestorage.app",
  messagingSenderId:"422987578809",
  appId:"1:422987578809:web:c76ccc09144f33bd0b8a68"
});
const fbAuth=firebase.auth();
const fbDb=firebase.firestore();
let FB_USER=null;
let _fbSaveTimer=null;
let _fbUnsubscribe=null;

function fbSave(){
  if(!FB_USER)return;
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer=setTimeout(()=>{
    fbDb.collection('users').doc(FB_USER.uid).set({
      json:JSON.stringify(S),
      ts:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(e=>console.error('Firestore save error:',e));
  },2000);
}

function _applyCloudData(json){
  const cloud=JSON.parse(json);
  const def=defState();
  S=migrate(Object.assign(def,cloud));
  ['tasks','habits','jobs','logs','journals','goals','clients','workers','checkIns','customPages','customEx','navConfig','meals','workouts'].forEach(k=>{if(!Array.isArray(S[k]))S[k]=def[k]||[];});
  localStorage.setItem(DB,JSON.stringify(S));
}

function fbSetupRealtimeSync(){
  if(!FB_USER)return;
  if(_fbUnsubscribe){_fbUnsubscribe();_fbUnsubscribe=null;}
  let _firstLoad=true;
  _fbUnsubscribe=fbDb.collection('users').doc(FB_USER.uid).onSnapshot(doc=>{
    if(!doc.exists||!doc.data()?.json){
      if(_firstLoad){fbSave();_firstLoad=false;}
      return;
    }
    const cloudTs=doc.data().ts?.toMillis?.()??0;
    const localTs=S._savedAt||0;
    if(_firstLoad){
      _firstLoad=false;
      if(localTs>cloudTs+1000){
        fbSave();
        toast('☁️ ローカルデータをクラウドに同期中…');
        return;
      }
      _applyCloudData(doc.data().json);
      fbSave();
      render();
      toast('☁️ クラウドから同期しました');
    } else {
      // リアルタイム更新 — クラウドが明らかに新しい場合のみ適用
      if(cloudTs>localTs+2000){
        _applyCloudData(doc.data().json);
        render();
        toast('📱 他のデバイスから同期しました');
      }
    }
  },e=>console.error('Firestore snapshot error:',e));
}

}

    :`<button onclick="signInWithGoogle()" style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:7px;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Googleでサインイン</button>`;
  const el=document.getElementById('auth-ui');if(el)el.innerHTML=html;
  const mob=document.getElementById('mob-auth-ui');if(mob)mob.innerHTML=html;
}

fbAuth.onAuthStateChanged(user=>{
  FB_USER=user;
  if(user){
    fbSetupRealtimeSync();
  } else {
    if(_fbUnsubscribe){_fbUnsubscribe();_fbUnsubscribe=null;}
  }
  renderAuthUI();
  renderGcalUI();

});

// ===GOOGLE CALENDAR===
let _gcalToken=null;
let _gcalTokenClient=null;
let _gcalUpcomingEvents=[];
let _gcalCalendarList=[];
const GCAL_SCOPE='https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/spreadsheets';
const GCAL_CLIENT_ID='422987578809-sr1p6f6l2tvlsgc6fqqramfsphrg8q5j.apps.googleusercontent.com';

function getGcalClientId(){
  return GCAL_CLIENT_ID;
}

function renderGcalUI(){
  const td=today();
  const tmr=new Date(new Date(td+'T00:00:00').getTime()+86400000).toISOString().slice(0,10);
  const fmtTime=dt=>{const d=new Date(dt);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};

  // アプリのタスクをイベント形式に変換
  const taskToEv=t=>({
    _type:'task',_done:t.done,
    date:t.dueDate,
    time:t.startTime||null,
    _sortKey:t.startTime||'99:99',
    title:t.title
  });
  const todayTasks=(S.tasks||[]).filter(t=>!t.deleted&&!t.done&&t.dueDate===td).map(taskToEv);
  const tmrTasks=(S.tasks||[]).filter(t=>!t.deleted&&!t.done&&t.dueDate===tmr).map(taskToEv);

  // Googleカレンダーイベントをイベント形式に変換
  const gcalToEv=e=>{
    const isTimed=!!e.start?.dateTime;
    return{
      _type:'gcal',
      date:e.start?.date||e.start?.dateTime?.slice(0,10),
      time:isTimed?fmtTime(e.start.dateTime):null,
      _sortKey:isTimed?fmtTime(e.start.dateTime):'99:99',
      title:e.summary||'(無題)'
    };
  };
  const todayGcal=_gcalUpcomingEvents.filter(e=>(e.start?.date||e.start?.dateTime?.slice(0,10))===td).map(gcalToEv);
  const tmrGcal=_gcalUpcomingEvents.filter(e=>(e.start?.date||e.start?.dateTime?.slice(0,10))===tmr).map(gcalToEv);

  // マージ＆時間順ソート
  const merge=(tasks,gcals)=>[...tasks,...gcals].sort((a,b)=>a._sortKey<b._sortKey?-1:a._sortKey>b._sortKey?1:0);
  const todayAll=merge(todayTasks,todayGcal);
  const tmrAll=merge(tmrTasks,tmrGcal);

  const evRow=ev=>{
    const icon=ev._type==='task'?`<span style="color:var(--green);flex-shrink:0;font-size:10px">✅</span>`:`<span style="color:var(--blue);flex-shrink:0;font-size:10px">📅</span>`;
    const timeEl=ev.time?`<span style="color:var(--purple);font-weight:600;flex-shrink:0;font-size:10px">${ev.time}</span>`:`<span style="color:var(--t3);flex-shrink:0;font-size:10px">終日</span>`;
    return`<div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px">${timeEl}${icon}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${esc(ev.title)}</span></div>`;
  };

  const evHtml='';
  const selCalIds=S.settings?.gcalCalendarIds||(S.settings?.gcalCalendarId?[S.settings.gcalCalendarId]:['primary']);
  const calPicker=_gcalCalendarList.length>0?`<div style="margin-top:6px;padding:5px 7px;background:var(--card2);border-radius:6px">
    <div style="font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:600">カレンダーを選択（複数可）</div>
    ${_gcalCalendarList.map(c=>{
      const checked=selCalIds.includes(c.id)||(selCalIds.includes('primary')&&c.primary&&selCalIds.length===1);
      return`<label style="display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;font-size:11px">
        <input type="checkbox" ${checked?'checked':''} onchange="gcalToggleCalendar('${esc(c.id)}')" style="accent-color:var(--purple);width:13px;height:13px">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${esc(c.summary)}${c.primary?' ⭐':''}</span>
      </label>`;
    }).join('')}
  </div>`:'';
  const html=_gcalToken
    ?`<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px">
      <div style="display:flex;align-items:center;gap:7px">
        <span style="color:var(--green);font-size:15px">📅</span>
        <div style="flex:1;min-width:0"><div style="color:var(--text);font-weight:600">Googleカレンダー</div><div style="color:var(--green);font-size:11px">✅ 連携中</div></div>
        <button onclick="gcalFetchUpcoming()" style="color:var(--blue);font-size:11px;padding:2px 6px;background:var(--pdim);border-radius:5px;border:none;cursor:pointer">更新</button>
        <button onclick="gcalDisconnect()" style="color:var(--t3);font-size:11px;padding:0;background:none;border:none;cursor:pointer">✕</button>
      </div>
      ${calPicker}
      ${evHtml}
    </div>`
    :S.settings?.gcalConnected
    ?`<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px">
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:15px">📅</span>
        <div style="flex:1;min-width:0"><div style="color:var(--text);font-weight:600">Googleカレンダー</div><div style="color:var(--amber);font-size:11px">⚠️ 再接続が必要</div></div>
        <button onclick="gcalManualReconnect()" style="color:var(--purple);font-size:11px;padding:2px 6px;background:var(--pdim);border-radius:5px;border:none;cursor:pointer;font-weight:600">再接続</button>
      </div>
    </div>`

function gcalEventsForDate(date){
  // アプリ内の全タスクタイトルセット（削除済み除く）— タイトル照合用
  const appTaskTitles=new Set(
    (S.tasks||[]).filter(t=>!t.deleted).map(t=>(t.title||'').trim().toLowerCase())
  );
  // GcalEventIDで取り込み済みのイベントIDセット
  const importedGcalIds=new Set((S.tasks||[]).filter(t=>t.gcalEventId).map(t=>t.gcalEventId));

  return _gcalUpcomingEvents.filter(e=>{
    const d=e.start?.date||e.start?.dateTime?.slice(0,10);
    if(d!==date)return false;
    const title=(e.summary||'').trim();
    // 除外: 確保時間
    if(title.includes('確保時間'))return false;
    // 除外: アプリがGcalに書き込んだイベント（案件納品・請求書・旧gcalSync）
    if(title.startsWith('🧾 請求書提出:'))return false;
    if(title.startsWith('📋 提出:'))return false;
    if(title.startsWith('📋 '))return false;
    // 除外: 既にアプリタスクとして取り込み済み（ID照合）
    if(importedGcalIds.has(e.id))return false;
    // 除外: アプリ内に同名タスクが既にある（タイトル照合 — 最重要）
    if(appTaskTitles.has(title.toLowerCase()))return false;
    return true;
  });
}

  if(ids.includes(id)){

async function gcalFetchUpcoming(){
  if(!_gcalToken)return;
  const td=today();
  const tMax=new Date(new Date(td+'T00:00:00').getTime()+2*86400000).toISOString().slice(0,10);
  const timeMin=new Date(td+'T00:00:00').toISOString();
  const timeMax=new Date(tMax+'T00:00:00').toISOString();
  const calIds=S.settings?.gcalCalendarIds||(S.settings?.gcalCalendarId?[S.settings.gcalCalendarId]:['primary']);
  try{
    const results=await Promise.all(calIds.map(async id=>{
      const calId=encodeURIComponent(id);
      const res=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calId}/events?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&orderBy=startTime&maxResults=30`,{
        headers:{'Authorization':'Bearer '+_gcalToken}
      });
      if(!res.ok)return[];
      const json=await res.json();
      return json.items||[];
    }));
    const all=[].concat(...results);
    all.sort((a,b)=>{
      const ta=a.start?.dateTime||a.start?.date||'';
      const tb=b.start?.dateTime||b.start?.date||'';
      return ta<tb?-1:ta>tb?1:0;
    });
    _gcalUpcomingEvents=all;
  }catch(e){console.error('gcalFetchUpcoming error',e);_gcalUpcomingEvents=[];}
  renderGcalUI();
}

function _gcalInitAndAuth(clientId,silent=false){
  if(typeof google==='undefined'){if(!silent)toast('Google APIの読み込み中です。少し待ってから再試行してください','warn');return;}
  _gcalTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:clientId,
    scope:GCAL_SCOPE,
    callback:(resp)=>{
      if(resp.error){
        if(!silent){
          toast('Googleカレンダーの連携に失敗しました: '+resp.error,'err');
          if(S.settings)S.settings.gcalConnected=false;
          save();
        }
        // silent失敗時はgcalConnectedをtrueのまま維持（次回リロードで再試行できるよう）
        // ただしサイドバーに再接続ボタンを表示
        renderGcalUI();
        return;
      }
      _gcalToken=resp.access_token;
      if(S.settings)S.settings.gcalConnected=true;
      save();
      if(!silent)toast('📅 Googleカレンダーと連携しました！');
      gcalFetchCalendarList();
      gcalFetchUpcoming();
      startSheetsAutoSync();
      render();
      // トークンは1時間で失効→自動リフレッシュ
      setTimeout(()=>_gcalRefreshToken(clientId), 55*60*1000);
    }
  });
  _gcalTokenClient.requestAccessToken({prompt:silent?'':'select_account'});
}
function _gcalRefreshToken(clientId){
  // バックグラウンドでトークンを自動更新（ポップアップなし）
  if(!S.settings?.gcalConnected)return;
  _gcalInitAndAuth(clientId,true);
}

function gcalDisconnect(){
  if(_gcalToken&&typeof google!=='undefined'){
    google.accounts.oauth2.revoke(_gcalToken,()=>{});
  }
  _gcalToken=null;
  _gcalCalendarList=[];
  _gcalUpcomingEvents=[];
  if(S.settings)S.settings.gcalConnected=false;
  save();
  render();
  toast('Googleカレンダーの連携を解除しました');
}

async function gcalImportEvents(){
  if(!_gcalToken){toast('先にGoogleカレンダーと連携してください','warn');return;}
  const td=today();
  const tMax=new Date(new Date(td+'T00:00:00').getTime()+30*86400000).toISOString().slice(0,10);
  let events=[];
  try{
    const res=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${td}T00%3A00%3A00Z&timeMax=${tMax}T00%3A00%3A00Z&singleEvents=true&orderBy=startTime`,{
      headers:{'Authorization':'Bearer '+_gcalToken}
    });
    const json=await res.json();
    events=json.items||[];
  }catch(e){console.error('gcalImportEvents error',e);toast('カレンダー取り込みに失敗しました','err');return;}
  let n=0,nTimed=0;
  for(const event of events){
    if(!event.summary)continue;
    if(S.tasks.find(t=>t.gcalEventId===event.id))continue;
    const isTimed=!!event.start?.dateTime;
    const dueDate=event.start?.date||event.start?.dateTime?.slice(0,10)||null;
    let startTime=null,endTime=null;
    if(isTimed){
      // タイムゾーンを考慮してローカル時刻で抽出
      const sd=new Date(event.start.dateTime),ed=new Date(event.end?.dateTime||event.start.dateTime);
      startTime=`${String(sd.getHours()).padStart(2,'0')}:${String(sd.getMinutes()).padStart(2,'0')}`;
      endTime=`${String(ed.getHours()).padStart(2,'0')}:${String(ed.getMinutes()).padStart(2,'0')}`;
      if(startTime===endTime)endTime=null; // 同じなら終了なし
      nTimed++;
    }
    S.tasks.push({id:uid(),title:event.summary,dueDate,startTime,endTime,gcalEventId:event.id,done:false,description:event.description||'',createdAt:new Date().toISOString()});
    n++;
  }
  if(n>0){save();render();}
  toast(`📅 ${n}件取り込み${nTimed?`（うち時刻付き ${nTimed}件）`:''}`);
}

// スプレッドシートへの書き込み（1案件）
async function sheetsWriteJob(job){
  if(!_gcalToken)return;
  const sid=(S.settings.sheetsId||'').trim();
  if(!sid)return;
  const tab=(S.settings.sheetsTab||'').trim();
  const pfx=tab?`'${tab}'!`:'';

  // ワーカー名・クライアント名を解決
  const workerNames=getJobWorkerNames(job)||'';
  const client=job.clientId?(S.clients||[]).find(c=>c.id===job.clientId):null;
  const clientName=client?client.name:'';

  // 既存行を検索（タイトル一致）
  let targetRow=-1;
  try{
    const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sid)}/values/${encodeURIComponent(pfx+'A:A')}`,{headers:{'Authorization':'Bearer '+_gcalToken}});
    if(res.ok){
      const d=await res.json();
      const rows=d.values||[];
      for(let i=1;i<rows.length;i++){
        if((rows[i][0]||'').trim()===(job.title||'').trim()){targetRow=i+1;break;}
      }
    }
  }catch(e){console.error('sheetsWriteJob find error',e);return;}

  // 書き込む値（I,Jは既存値を保持）
  let matLink='',refLink='';
  if(targetRow>0){
    try{
      const r2=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sid)}/values/${encodeURIComponent(pfx+'I'+targetRow+':J'+targetRow)}`,{headers:{'Authorization':'Bearer '+_gcalToken}});
      if(r2.ok){const d2=await r2.json();const v=d2.values?.[0]||[];matLink=v[0]||'';refLink=v[1]||'';}
    }catch(e){}
  }

  const rowVals=[
    job.title||'',
    job.status||'',
    workerNames,
    job.sharedDate||'',
    job.editorDraftDate||'',
    job.clientDraftDate||'',
    job.deliveryDate||'',
    job.unitPrice!=null?String(job.unitPrice):'',
    matLink,
    refLink,
    clientName,
    job.notes||''
  ];

  try{
    if(targetRow>0){
      // 既存行を更新
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sid)}/values/${encodeURIComponent(pfx+'A'+targetRow+':L'+targetRow)}?valueInputOption=USER_ENTERED`,{
        method:'PUT',
        headers:{'Authorization':'Bearer '+_gcalToken,'Content-Type':'application/json'},
        body:JSON.stringify({values:[rowVals]})
      });
    }else{
      // 新規行を追加
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sid)}/values/${encodeURIComponent(pfx+'A:L')}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,{
        method:'POST',
        headers:{'Authorization':'Bearer '+_gcalToken,'Content-Type':'application/json'},
        body:JSON.stringify({values:[rowVals]})
      });
    }
    console.log('[Sheets] synced:',job.title);
  }catch(e){console.error('sheetsWriteJob write error',e);}
}

function sheetRowToJob(row,childRows){
  // col: A=0案件名, B=1ステータス, C=2担当編集者, D=3編集共有日, E=4編集者初稿提出日
  //      F=5クライアント初稿確認日, G=6納品日, H=7報酬額, I=8素材リンク, J=9参考動画リンク
  //      K=10プロマネ, L=11備考
  const get=(r,i)=>(r[i]||'').trim();
  const parseDate=(s)=>{
    if(!s)return'';
    // MM/DD or YYYY/MM/DD or M月D日
    s=s.replace(/\s/g,'');
    const m1=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if(m1)return`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
    const m2=s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
    if(m2){const y=new Date().getFullYear();return`${y}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`;}
    const m3=s.match(/^(\d{1,2})月(\d{1,2})日?$/);
    if(m3){const y=new Date().getFullYear();return`${y}-${m3[1].padStart(2,'0')}-${m3[2].padStart(2,'0')}`;}
    return'';
  };
  const parsePrice=(s)=>{
    if(!s)return 0;
    const n=parseInt(s.replace(/[¥,￥\s]/g,''));
    return isNaN(n)?0:n;
  };
  // Worker lookup by name
  const workerName=get(row,2);
  const worker=workerName?(S.workers||[]).find(w=>w.name===workerName||w.name.includes(workerName)||workerName.includes(w.name)):null;
  // Client lookup by name (プロマネ欄 = clientId)
  const clientName=get(row,10);
  const client=clientName?(S.clients||[]).find(c=>c.name===clientName||c.name.includes(clientName)||clientName.includes(c.name)):null;
  // Notes from I, J, L
  const notesParts=[];
  const matLink=get(row,8);const refLink=get(row,9);const備考=get(row,11);
  if(matLink)notesParts.push('素材: '+matLink);
  if(refLink)notesParts.push('参考: '+refLink);
  if(備考)notesParts.push(備考);
  // Subtasks from child rows
  const subtasks=childRows.map((cr,i)=>({
    id:uid(),title:get(cr,0).replace(/^[└├│\s]+/,'').trim(),
    status:'案件掲載中',done:false,
    workerId:null,unitPrice:0,workerPay:0,
    sharedDate:parseDate(get(cr,3)),
    editorDraftDate:parseDate(get(cr,4)),
    clientDraftDate:parseDate(get(cr,5)),
    deliveryDate:parseDate(get(cr,6))
  })).filter(s=>s.title);
  return{
    id:uid(),
    title:get(row,0),
    status:'案件掲載中',
    workerId:worker?worker.id:null,
    clientId:client?client.id:null,
    scope:'',
    unitPrice:parsePrice(get(row,7)),
    profit:0,
    workerPay:0,
    sharedDate:parseDate(get(row,3)),
    editorDraftDate:parseDate(get(row,4)),
    clientDraftDate:parseDate(get(row,5)),
    deliveryDate:parseDate(get(row,6)),
    invoiceDate:'',paymentDate:'',payoutDate:'',
    notes:notesParts.join('\n'),
    subtasks,
    createdAt:new Date().toISOString()
  };
}

function migrate(d){
  // migrate ef_v4 → ef_v5
  const old=localStorage.getItem(DB_OLD);
  if(old&&!localStorage.getItem(DB)){try{const o=JSON.parse(old);Object.assign(d,o);localStorage.setItem(DB,JSON.stringify(d));localStorage.removeItem(DB_OLD);}catch{}}
  // migrate v10→v11: 指定ワーカーをトライアルに設定、誤採用ログ削除
  if(!d.settings._workerTrialMigrated2){
    const trialWorkerNames=['矢田部','菅野','鈴木','松下'];
    (d.workers||[]).forEach(w=>{
      if(trialWorkerNames.some(n=>w.name&&w.name.includes(n))){
        w.employStatus='trial';
        // 誤った採用ログを削除
        (d.logs||[]).forEach(l=>{
          if(l.type==='hire'&&l.result==='内定'&&(l.sourceWorkerId===w.id||l.title===w.name))l.deleted=true;
        });
      }
    });
    d.settings._workerTrialMigrated2=true;
  }
  // migrate v9→v10: 指定クライアントのトライアル設定・削除・重複除去
  if(!d.settings._clientTrialMigrated2){
    const trialNames=['藤原みさき','ゆめみん日和','磯崎良太'];
    const deleteNames=['なな','優樹'];
    // トライアルに設定
    (d.clients||[]).forEach(c=>{
      if(trialNames.some(n=>c.name&&c.name.includes(n)))c.isTrial=true;
    });
    // 削除
    (d.clients||[]).forEach(c=>{
      if(deleteNames.some(n=>c.name&&c.name.includes(n)))c.deleted=true;
    });
    // ゆめみん日和様の重複除去（最初の1件を残す）
    const yumeCls=(d.clients||[]).filter(c=>!c.deleted&&c.name&&c.name.includes('ゆめみん日和'));
    if(yumeCls.length>1)yumeCls.slice(1).forEach(c=>c.deleted=true);
    // トライアル/削除クライアントの誤った成約ログを削除
    const badClients=(d.clients||[]).filter(c=>c.isTrial||c.deleted);
    (d.logs||[]).forEach(l=>{
      if(l.type==='sales'&&l.result==='成約'&&badClients.some(c=>c.id===l.sourceClientId||c.name===l.title))l.deleted=true;
    });
    d.settings._clientTrialMigrated2=true;
  }
  // migrate v8→v9: 進行中 + 外注担当者あり → 編集者進行中
  if(!d.settings)d.settings={};
  if(!d.settings._editorStatusMigrated){
    const workers=d.workers||[];
    let n=0;
    (d.jobs||[]).forEach(j=>{
      if(j.deleted||j.status!=='進行中')return;
      // 外注担当者＝SELF_WID以外のworkerIdが設定されている
      const isOutsourced=j.workerId&&j.workerId!=='self'&&workers.find(w=>w.id===j.workerId);
      if(isOutsourced){j.status='編集者進行中';n++;}
      // サブタスクも同様に変換
      (j.subtasks||[]).forEach(s=>{
        if(s.status==='進行中'&&s.workerId&&s.workerId!=='self'&&workers.find(w=>w.id===s.workerId)){
          s.status='編集者進行中';n++;
        }
      });
    });
    d.settings._editorStatusMigrated=true;
    if(n>0)console.log(`[migrate] 編集者進行中に変換: ${n}件`);
  }
  // migrate: workerId(単一) → workerIds(配列)
  if(!d.settings._workerIdsMigrated){
    (d.jobs||[]).forEach(j=>{
      if(!j.workerIds){
        j.workerIds=j.workerId?[j.workerId]:[];
      }
    });
    d.settings._workerIdsMigrated=true;
  }
  return d;
}

function getMonthDays(off){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth()+off;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const sd=(first.getDay()+6)%7;
  const days=Array(sd).fill(null);
  for(let i=1;i<=last.getDate();i++)days.push(new Date(y,m,i).toISOString().slice(0,10));
  while(days.length%7!==0)days.push(null);
  return{y:first.getFullYear(),m:first.getMonth(),days};
}

function calcStreak(dates){
  if(!dates||!dates.length)return 0;
  const sorted=[...dates].sort().reverse();let streak=0,d=new Date(today());
  for(let i=0;i<365;i++){const ds=d.toISOString().slice(0,10);if(sorted.includes(ds)){streak++;d.setDate(d.getDate()-1);}else if(i===0)d.setDate(d.getDate()-1);else break;}
  return streak;
}
function isStreakRisk(h){

  return cd.includes(yd.toISOString().slice(0,10))&&calcStreak(cd)>=2;
}

function revGoalStats(g){
  const n=new Date(),td=today(),yr=n.getFullYear(),mo=n.getMonth();
  const hz=g.horizon||'this_month';
  let earned=0,endDate;
  if(hz==='this_month'){
    earned=S.logs.filter(l=>!l.deleted&&(l.type==='revenue'||!l.type)&&l.date?.startsWith(td.slice(0,7))).reduce((s,l)=>s+(l.amount||0),0);
    endDate=new Date(yr,mo+1,0);
  }else if(hz==='next_month'){
    const ym=`${yr}-${String(mo+2).padStart(2,'0')}`;
    earned=S.logs.filter(l=>!l.deleted&&(l.type==='revenue'||!l.type)&&l.date?.startsWith(ym)).reduce((s,l)=>s+(l.amount||0),0);
    endDate=new Date(yr,mo+2,0);
  }else if(hz==='monthly'){
    const tm=g.targetMonth||td.slice(0,7);
    earned=S.logs.filter(l=>!l.deleted&&(l.type==='revenue'||!l.type)&&l.date?.startsWith(tm)).reduce((s,l)=>s+(l.amount||0),0);
    const[tyr,tmo]=tm.split('-').map(Number);
    endDate=new Date(tyr,tmo,0);
  }else if(hz==='year1'){
    earned=S.logs.filter(l=>!l.deleted&&(l.type==='revenue'||!l.type)&&l.date?.startsWith(String(yr))).reduce((s,l)=>s+(l.amount||0),0);
    endDate=new Date(yr,11,31);
  }else{
    earned=S.logs.filter(l=>!l.deleted&&(l.type==='revenue'||!l.type)).reduce((s,l)=>s+(l.amount||0),0);
    endDate=g.deadline?new Date(g.deadline):new Date(n.getTime()+(hz==='year5'?5:10)*365.25*86400000);
  }
  const remaining=Math.max(0,(g.targetAmount||0)-earned);
  const daysLeft=Math.max(1,Math.ceil((endDate-n)/86400000)+1);
  const pct=g.targetAmount>0?Math.min(100,Math.round(earned/g.targetAmount*100)):0;
  return{earned,remaining,daysLeft,pct};
}

function checkKpiLock(){
  if(!S.settings?.kpiLockEnabled)return false;
  if(!S.divisions||S.divisions.length===0)return false;
  const td=today();
  const now=new Date(td+'T00:00:00');
  const dayOfWeek=now.getDay();
  const monday=new Date(now);
  monday.setDate(now.getDate()-(dayOfWeek===0?6:dayOfWeek-1));
  const mondayStr=monday.toISOString().slice(0,10);
  const activeDivs=S.divisions.filter(d=>!d.deleted);
  if(activeDivs.length===0)return false;
  return activeDivs.some(d=>{
    const h=d.horizons?.['1w'];
    if(!h?.updatedAt)return true;
    return h.updatedAt<mondayStr;
  });
}
function checkDailyLock(){
  // タイムスケジュールロック（最優先）
  if(checkTimeScheduleLock())return true;
  const now=new Date();
  const hour=now.getHours();
  const td=today();
  const morningLockOn=S.settings?.morningLockEnabled!==false;
  const eveningLockOn=S.settings?.eveningLockEnabled!==false;
  const hasMorning=S.journals.some(j=>j.date===td&&(j.type==='morning'||!j.type)&&(j.topPriority||j.focusBlock||j.notToDo||j.decisions||j.obstacle||j.commitment||j.mood||j.content||j.gratitude||j.win));
  // 朝8時以降で朝のジャーナルが未完了 → 朝ロック（設定ON時のみ）
  if(morningLockOn&&hour>=8&&hour<19&&!hasMorning&&!sessionStorage.getItem('ef_skip_morning_'+td))return true;
  if(hour<19){
    // 時間帯に関わらずKPIロックをチェック
    return checkKpiLock();
  }
  if(!eveningLockOn)return checkKpiLock();
  const hasEvening=S.journals.some(j=>j.date===td&&j.type==='evening'&&(j.achievement||j.reflection||j.tomorrow));
  const todayHabits=S.habits.filter(h=>!h.deleted);
  const habitDone=todayHabits.length===0||todayHabits.every(h=>(h.completedDates||[]).includes(td)||(h.failedDates||[]).includes(td));
  const gymOk=!S.settings?.gymCommit||gymDoneToday();
  if(!hasMorning||!hasEvening||!habitDone||!gymOk)return true;
  return checkKpiLock();
}

function rFixedScheduleList(compact=false,droppable=false){
  const fs=S.fs||DEFAULT_FS;
  if(!fs.length)return'';
  const now=new Date();
  const nowM=now.getHours()*60+now.getMinutes();
  return fs.map((f,i)=>{

    const dropAttrs=droppable?`ondragover="fsBlockDragOver(event,${i})" ondragleave="fsBlockDragLeave(event,${i})" ondrop="fsBlockDrop(event,'${f.s}',${i})" id="fs-block-${i}"`:'';
    return`<div class="task-item fs-drop-zone" ${dropAttrs} style="border-left:3px solid ${f.c};${isNow?'background:'+f.c+'18;':''};margin-bottom:5px;transition:background .15s">

      ${t.priority?`<span class="badge ${pmap[t.priority]}">${plbl[t.priority]}</span>`:''}
      ${stot?`<span class="badge bb">☑ ${sdone}/${stot}</span>`:''}
      ${(t.procCount||0)>0?`<span class="proc-count">⏭ ${t.procCount}回後回し</span>`:''}
    </div>
    ${stot?`<div class="subtask-list">${(t.subtasks||[]).map((s,i)=>`<div class="sub-item"><div class="sub-chk ${s.done?'done':''}" onclick="toggleSub('${t.id}',${i})"></div><span style="${s.done?'text-decoration:line-through;color:var(--t3)':''}">${esc(s.title)}</span></div>`).join('')}</div>`:''}
  </div>
  <div class="task-acts">
    ${!t.done?`<button class="tact" title="集中" onclick="startPomoFor('${t.id}')">🍅</button>`:''}
    ${!t.done?`<button class="tact" title="後回し" onclick="procrastinate('${t.id}')">⏭</button>`:''}
    ${!t.done&&!isFrog?`<button class="tact" title="カエル設定" onclick="setFrog('${t.id}');render()">🐸</button>`:''}
    <button class="tact" onclick="openTaskModal('${t.id}')">✏️</button>
    <button class="tact del" onclick="delTask('${t.id}')">🗑</button>
  </div>
</div>`;
}
