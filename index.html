  _editPageId=id;
  const page=(S.customPages||[]).find(p=>p.id===id);if(!page)return;
  openModalLg(`<div class="mhdr"><div class="mtitle">${page.icon} ${esc(page.title)} — 編集</div><button class="mclose" onclick="closeModal()">✕</button></div>
<div class="frow" style="margin-bottom:10px">
  <div class="fg"><div class="fl">タイトル</div><input id="cpe-ttl" value="${esc(page.title)}" oninput="updPageMeta('${id}')"></div>
  <div class="fg" style="max-width:100px"><div class="fl">アイコン</div><input id="cpe-icon" value="${page.icon||'📄'}" style="text-align:center;font-size:18px;padding:6px" oninput="updPageMeta('${id}')"></div>
</div>
<div id="cpe-blocks">${(page.blocks||[]).map((b,i)=>rBlockEd(b,i,id,page.blocks.length)).join('')}</div>
<div class="block-add-row">${BLOCK_TYPES.map(bt=>`<button class="btn btn-g btn-sm" onclick="addBlock('${id}','${bt.t}')">${bt.l}</button>`).join('')}</div>
<div class="mfooter">
  <button class="btn btn-g" onclick="closeModal()">閉じる</button>
  <button class="btn btn-p" onclick="V='cp_${id}';closeModal();render()">ページを開く →</button>
</div>`);
}
function updPageMeta(id){
  const page=(S.customPages||[]).find(p=>p.id===id);if(!page)return;
  const t=document.getElementById('cpe-ttl')?.value.trim();const ic=document.getElementById('cpe-icon')?.value.trim();
  if(t)page.title=t;if(ic)page.icon=ic;save();
}
function rBlockEd(b,i,pid,total){
  const typeLbl={
    heading:'📌 見出し',text:'📝 テキスト',note:'💛 付箋',checklist:'✅ チェックリスト',
    counter:'🔢 カウンター',links:'🔗 リンク集',
    h1:'H1 大見出し',h2:'H2 中見出し',h3:'H3 小見出し',
    bullet:'• 箇条書き',numbered:'1. 番号付き',quote:'❝ 引用',
    divider:'── 区切り線',toggle:'▶ トグル',code:'</> コード',
  };
  let inner='';
  if(b.type==='heading'){
    inner=`<input value="${esc(b.text||'')}" placeholder="見出しテキスト" style="font-size:15px;font-weight:700" oninput="updBF('${pid}',${i},'text',this.value)">`;
  }else if(b.type==='h1'){
    inner=`<input value="${esc(b.text||'')}" placeholder="大見出し…" class="cpb-h-input cpb-h1-input" oninput="updBF('${pid}',${i},'text',this.value)">`;
  }else if(b.type==='h2'){
    inner=`<input value="${esc(b.text||'')}" placeholder="中見出し…" class="cpb-h-input cpb-h2-input" oninput="updBF('${pid}',${i},'text',this.value)">`;
  }else if(b.type==='h3'){
    inner=`<input value="${esc(b.text||'')}" placeholder="小見出し…" class="cpb-h-input cpb-h3-input" oninput="updBF('${pid}',${i},'text',this.value)">`;
  }else if(b.type==='text'){
    inner=`<textarea rows="3" oninput="updBF('${pid}',${i},'content',this.value)">${esc(b.content||'')}</textarea>`;
  }else if(b.type==='note'){
    inner=`<textarea rows="3" style="border-color:var(--amber)" oninput="updBF('${pid}',${i},'content',this.value)">${esc(b.content||'')}</textarea>`;
  }else if(b.type==='bullet'||b.type==='numbered'){
    inner=`<div>${(b.items||['']).map((it,j)=>`<div style="display:flex;gap:6px;margin-bottom:4px;align-items:center">
      <span style="color:var(--pl);font-weight:600;flex-shrink:0;min-width:20px">${b.type==='numbered'?`${j+1}.`:'•'}</span>
      <input value="${esc(it||'')}" style="flex:1" placeholder="項目${j+1}" oninput="updBulletItem('${pid}',${i},${j},this.value)">
      <button class="btn btn-red btn-xs" onclick="delBulletItem('${pid}',${i},${j})">✕</button>
    </div>`).join('')}</div>
    <button class="btn btn-g btn-xs" style="margin-top:4px" onclick="addBulletItem('${pid}',${i})">＋ 項目追加</button>`;
  }else if(b.type==='quote'){
    inner=`<textarea rows="3" style="border-left:4px solid var(--purple);border-radius:0 var(--rs) var(--rs) 0;font-style:italic" oninput="updBF('${pid}',${i},'content',this.value)">${esc(b.content||'')}</textarea>`;
  }else if(b.type==='divider'){
    inner=`<div style="text-align:center;color:var(--t3);font-size:12px;padding:4px 0">── 区切り線（設定なし）──</div>`;
  }else if(b.type==='toggle'){
    inner=`<div class="frow" style="margin-bottom:8px">
      <div class="fg"><div class="fl">タイトル</div><input value="${esc(b.title||'')}" placeholder="トグルのタイトル" oninput="updBF('${pid}',${i},'title',this.value)"></div>
    </div>
    <textarea rows="3" placeholder="展開時の内容…" oninput="updBF('${pid}',${i},'content',this.value)">${esc(b.content||'')}</textarea>`;
  }else if(b.type==='code'){
    inner=`<textarea rows="5" style="font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;background:#1a1a2e;color:#a8b4d8;border-color:#2d2d4e" oninput="updBF('${pid}',${i},'content',this.value)">${esc(b.content||'')}</textarea>`;
  }else if(b.type==='counter'){
    inner=`<div class="frow">
      <div class="fg"><div class="fl">ラベル</div><input value="${esc(b.label||'カウンター')}" oninput="updBF('${pid}',${i},'label',this.value)"></div>
      <div class="fg" style="max-width:90px"><div class="fl">現在値</div><input type="number" value="${b.value||0}" oninput="updBF('${pid}',${i},'value',+this.value)"></div>
      <div class="fg" style="max-width:90px"><div class="fl">増減幅</div><input type="number" value="${b.step||1}" min="1" oninput="updBF('${pid}',${i},'step',+this.value)"></div>
    </div>`;
  }else if(b.type==='checklist'){
    inner=`<div id="bclst-${i}">${(b.items||[]).map((it,j)=>`<div style="display:flex;gap:6px;margin-bottom:5px">
      <input value="${esc(it.text||'')}" style="flex:1" placeholder="項目${j+1}" oninput="updCI('${pid}',${i},${j},this.value)">
      <button class="btn btn-red btn-xs" onclick="delCI('${pid}',${i},${j})">✕</button>
    </div>`).join('')}</div>
    <button class="btn btn-g btn-xs" style="margin-top:4px" onclick="addCI('${pid}',${i})">＋ 項目追加</button>`;
  }else if(b.type==='links'){
    inner=`<div id="blnk-${i}">${(b.items||[]).map((it,j)=>`<div style="display:flex;gap:6px;margin-bottom:5px">
      <input value="${esc(it.label||'')}" placeholder="ラベル" style="width:120px;flex-shrink:0" oninput="updLI('${pid}',${i},${j},'label',this.value)">
      <input value="${esc(it.url||'')}" placeholder="https://..." style="flex:1" oninput="updLI('${pid}',${i},${j},'url',this.value)">
      <button class="btn btn-red btn-xs" onclick="delLI('${pid}',${i},${j})">✕</button>
    </div>`).join('')}</div>
    <button class="btn btn-g btn-xs" style="margin-top:4px" onclick="addLI('${pid}',${i})">＋ リンク追加</button>`;
  }
  return`<div class="block-item" id="bei-${i}">
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
    <span class="block-type-tag">${typeLbl[b.type]||b.type}</span><span style="flex:1"></span>
    ${i>0?`<button class="btn btn-g btn-xs" onclick="moveBlock('${pid}',${i},-1)">↑</button>`:''}
    ${i<total-1?`<button class="btn btn-g btn-xs" onclick="moveBlock('${pid}',${i},1)">↓</button>`:''}
    <button class="btn btn-red btn-xs" onclick="deleteBlock('${pid}',${i})">削除</button>
  </div>${inner}</div>`;
}

// Block field updaters (live-save)
function updBF(pid,idx,field,val){const page=(S.customPages||[]).find(p=>p.id===pid);if(page?.blocks[idx])page.blocks[idx][field]=val;save();}
function addBlock(pid,type,afterIdx){
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  // Special defaults for types not covered by makeBlockDefaults
  let nb;
  if(type==='heading')nb={id:uid(),type:'heading',text:'見出し'};
  else if(type==='counter')nb={id:uid(),type:'counter',label:'カウンター',value:0,step:1};
  else nb=makeBlockDefaults(type,uid());
  if(afterIdx!=null&&afterIdx>=0&&afterIdx<page.blocks.length){
    page.blocks.splice(afterIdx+1,0,nb);
  }else{
    page.blocks.push(nb);
  }
  save();render();
  // focus newly added block
  setTimeout(()=>{
    const newIdx=afterIdx!=null?afterIdx+1:page.blocks.length-1;
    const el=document.querySelector(`[data-block-idx="${newIdx}"] textarea,[data-block-idx="${newIdx}"] input`);
    if(el){el.focus();if(el.tagName==='TEXTAREA'){el.selectionStart=el.selectionEnd=0;}}
  },30);
}
function deleteBlock(pid,idx){const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;page.blocks.splice(idx,1);save();render();}
function moveBlock(pid,idx,dir){
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const ni=idx+dir;if(ni<0||ni>=page.blocks.length)return;
  [page.blocks[idx],page.blocks[ni]]=[page.blocks[ni],page.blocks[idx]];save();render();
}
function addCI(pid,bi){const p=(S.customPages||[]).find(p=>p.id===pid);if(!p)return;if(!p.blocks[bi].items)p.blocks[bi].items=[];p.blocks[bi].items.push({id:uid(),text:'',done:false});save();render();}
function delCI(pid,bi,ii){const p=(S.customPages||[]).find(p=>p.id===pid);if(!p)return;p.blocks[bi].items.splice(ii,1);save();render();}
function updCI(pid,bi,ii,val){const p=(S.customPages||[]).find(p=>p.id===pid);if(p?.blocks[bi]?.items[ii])p.blocks[bi].items[ii].text=val;save();}
function addLI(pid,bi){const p=(S.customPages||[]).find(p=>p.id===pid);if(!p)return;if(!p.blocks[bi].items)p.blocks[bi].items=[];p.blocks[bi].items.push({id:uid(),label:'',url:''});save();render();}
function delLI(pid,bi,ii){const p=(S.customPages||[]).find(p=>p.id===pid);if(!p)return;p.blocks[bi].items.splice(ii,1);save();render();}
function updLI(pid,bi,ii,field,val){const p=(S.customPages||[]).find(p=>p.id===pid);if(p?.blocks[bi]?.items[ii])p.blocks[bi].items[ii][field]=val;save();}

// Custom page renderer
function rCustomPage(page){
  const blocks=page.blocks||[];
  const pid=page.id;
  const addBtns=(atEnd=true)=>{
    const mainTypes=[
      {t:'h1',l:'H1'},{t:'h2',l:'H2'},{t:'h3',l:'H3'},
      {t:'text',l:'📝テキスト'},{t:'note',l:'💛付箋'},{t:'bullet',l:'•箇条書き'},
      {t:'numbered',l:'1.番号リスト'},{t:'quote',l:'❝引用'},{t:'divider',l:'──区切り'},
      {t:'toggle',l:'▶トグル'},{t:'code',l:'</>コード'},{t:'checklist',l:'✅チェック'},
      {t:'counter',l:'🔢カウンター'},{t:'links',l:'🔗リンク集'},
    ];
    return`<div class="block-add-row" style="margin-top:${atEnd?'14':'0'}px">
      ${mainTypes.map(bt=>`<button class="btn btn-g btn-sm" onclick="addBlock('${pid}','${bt.t}')">${bt.l}</button>`).join('')}
    </div>`;
  };
  if(CP_EDIT_MODE){
    return`<div class="ph" style="flex-wrap:wrap;gap:8px;align-items:center">
  <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:180px">
    <input id="cpe-icon" value="${esc(page.icon||'📄')}" style="width:38px;text-align:center;font-size:18px;padding:4px;flex-shrink:0" oninput="updPageMeta('${pid}')">
    <input id="cpe-ttl" value="${esc(page.title)}" style="font-size:17px;font-weight:700;flex:1;padding:4px 8px" oninput="updPageMeta('${pid}')">
  </div>
  <button class="btn btn-p btn-sm" onclick="CP_EDIT_MODE=false;render()">✓ 完了</button>
</div>
${blocks.map((b,i)=>rBlockEd(b,i,pid,blocks.length)).join('')}
${addBtns()}`;
  }
  return`<div class="ph">
  <div class="ph-title">${esc(page.icon||'📄')} ${esc(page.title)}</div>
  <div style="display:flex;gap:6px">
    <span style="font-size:11px;color:var(--t3);align-self:center">テキストで / を入力してブロック追加</span>
    <button class="btn btn-g btn-sm" onclick="CP_EDIT_MODE=true;render()">✏️ 編集</button>
  </div>
</div>
${blocks.map((b,i)=>rBlock(b,pid,i)).join('')}
${!blocks.length?`<div class="card" style="text-align:center;color:var(--t2);padding:32px 20px">
  <div style="font-size:36px;margin-bottom:10px">📝</div>
  <div>まだブロックがありません</div>
  <button class="btn btn-p btn-sm" style="margin-top:12px" onclick="CP_EDIT_MODE=true;render()">＋ ブロックを追加</button>
</div>`:''}`;
}
function rBlockInner(b,pid,idx){
  const onInput=(field,extra='')=>`updBF('${pid}',${idx},'${field}',this.value);${extra}`;
  const autoH=`this.style.height='auto';this.style.height=this.scrollHeight+'px'`;
  const kbAttr=`data-pid="${pid}" data-idx="${idx}"`;
  const textKb=`onkeydown="blockKeyDown(event,this)"`;

  if(b.type==='heading')return`<div class="cpb"><input class="cpb-heading-input" value="${esc(b.text||'')}" placeholder="見出しを入力…" ${kbAttr} ${textKb} oninput="${onInput('text')}"></div>`;
  if(b.type==='h1')return`<div class="cpb cpb-h1"><input class="cpb-h-input cpb-h1-input" value="${esc(b.text||'')}" placeholder="大見出し…" ${kbAttr} ${textKb} oninput="${onInput('text')}"></div>`;
  if(b.type==='h2')return`<div class="cpb cpb-h2"><input class="cpb-h-input cpb-h2-input" value="${esc(b.text||'')}" placeholder="中見出し…" ${kbAttr} ${textKb} oninput="${onInput('text')}"></div>`;
  if(b.type==='h3')return`<div class="cpb cpb-h3"><input class="cpb-h-input cpb-h3-input" value="${esc(b.text||'')}" placeholder="小見出し…" ${kbAttr} ${textKb} oninput="${onInput('text')}"></div>`;
  if(b.type==='text')return`<div class="cpb card"><textarea class="cpb-text-input" rows="3" placeholder="テキストを入力… (/ でブロック追加)" ${kbAttr} oninput="${onInput('content',autoH)}" onkeydown="blockKeyDown(event,this);slashKeyDown(event,this,'${pid}',${idx})">${esc(b.content||'')}</textarea></div>`;
  if(b.type==='note')return`<div class="cpb cpb-note" style="padding:0"><textarea class="cpb-note-input" rows="3" placeholder="メモを入力… (/ でブロック追加)" ${kbAttr} oninput="${onInput('content',autoH)}" onkeydown="blockKeyDown(event,this);slashKeyDown(event,this,'${pid}',${idx})">${esc(b.content||'')}</textarea></div>`;
  if(b.type==='bullet'||b.type==='numbered'){
    const items=b.items&&b.items.length?b.items:[''];
    const prefix=b.type==='bullet';
    return`<div class="cpb ${prefix?'cpb-bullet':'cpb-numbered'}">
      ${items.map((it,j)=>`<div style="display:flex;align-items:flex-start;gap:8px;min-height:26px">
        <span style="color:var(--pl);font-weight:600;flex-shrink:0;padding-top:4px;min-width:20px">${prefix?'•':j+1+'.'}</span>
        <input value="${esc(it||'')}" placeholder="項目${j+1}" ${kbAttr}
          style="flex:1;border:none;background:transparent;color:var(--text);font:inherit;outline:none;padding:3px 0"
          oninput="updBulletItem('${pid}',${idx},${j},this.value)"
          onkeydown="listItemKeyDown(event,this,'${pid}',${idx},${j})">
      </div>`).join('')}
    </div>`;
  }
  if(b.type==='quote')return`<div class="cpb cpb-quote"><textarea class="cpb-quote-input" rows="2" placeholder="引用テキスト…" ${kbAttr} ${textKb} oninput="${onInput('content',autoH)}">${esc(b.content||'')}</textarea></div>`;
  if(b.type==='divider')return`<div class="cpb cpb-divider"><hr></div>`;
  if(b.type==='toggle'){
    const open=b.open;
    return`<div class="cpb cpb-toggle">
      <div class="cpb-toggle-hdr" onclick="toggleBlock('${pid}',${idx})">
        <span class="cpb-toggle-arrow ${open?'open':''}">▶</span>
        <span>${esc(b.title||'トグル')}</span>
      </div>
      ${open?`<div class="cpb-toggle-body">${esc(b.content||'').replace(/\n/g,'<br>') || '<span style="color:var(--t3);font-size:12px">内容がありません</span>'}</div>`:''}
    </div>`;
  }
  if(b.type==='code')return`<div class="cpb cpb-code"><textarea class="cpb-code-input" rows="5" placeholder="コードを入力…" ${kbAttr} oninput="${onInput('content',autoH)}">${esc(b.content||'')}</textarea></div>`;
  if(b.type==='counter')return`<div class="cpb card cpb-counter">
    <div class="cpb-counter-lbl">${esc(b.label||'カウンター')}</div>
    <div class="cpb-counter-val" id="ctr-${pid}-${idx}">${b.value||0}</div>
    <div class="cpb-counter-btns">
      <button class="btn btn-p" style="font-size:22px;padding:6px 18px" onclick="adjCtr('${pid}',${idx},-1)">－</button>
      <button class="btn btn-g btn-sm" onclick="adjCtr('${pid}',${idx},0)">リセット</button>
      <button class="btn btn-p" style="font-size:22px;padding:6px 18px" onclick="adjCtr('${pid}',${idx},1)">＋</button>
    </div>
  </div>`;
  if(b.type==='checklist'){
    const done=(b.items||[]).filter(it=>it.done).length,tot=(b.items||[]).length;
    return`<div class="cpb card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:700">${esc(b.title||'チェックリスト')}<span class="badge bk">${done}/${tot}</span></div>
      ${(b.items||[]).map((it,j)=>`<div class="cpb-check-item">
        <div class="chk ${it.done?'done':''}" onclick="toggleCI('${pid}',${idx},${j})"></div>
        <span style="${it.done?'text-decoration:line-through;color:var(--t3)':''}">${esc(it.text||'')}</span>
      </div>`).join('')}
      ${!tot?`<div style="color:var(--t3);font-size:12px">項目がありません — 編集から追加できます</div>`:''}
    </div>`;
  }
  if(b.type==='links')return`<div class="cpb card">
    ${b.title?`<div style="font-weight:700;margin-bottom:10px">${esc(b.title)}</div>`:''}
    ${(b.items||[]).map(it=>`<div class="cpb-link-item">
      <a href="${esc(it.url||'#')}" target="_blank" rel="noopener" class="cpb-link-a">${esc(it.label||it.url||'リンク')}</a>
    </div>`).join('')}
    ${!(b.items||[]).length?`<div style="color:var(--t3);font-size:12px">リンクがありません</div>`:''}
  </div>`;
  return'';
}

function rBlock(b,pid,idx){
  const inner=rBlockInner(b,pid,idx);
  return`<div class="notion-block-wrap" data-block-idx="${idx}" data-pid="${pid}"
    draggable="true"
    ondragstart="blockDragStart(event,${idx},'${pid}')"
    ondragend="blockDragEnd(event)"
    ondragover="blockDragOver(event,${idx},'${pid}')"
    ondrop="blockDrop(event,${idx},'${pid}')">
    <div class="block-drag-handle" title="ドラッグして並び替え">⠿</div>
    ${inner}
  </div>`;
}
function adjCtr(pid,idx,dir){
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const b=page.blocks[idx];if(!b)return;
  b.value=dir===0?0:(b.value||0)+dir*(b.step||1);
  save();
  const el=document.getElementById(`ctr-${pid}-${idx}`);if(el)el.textContent=b.value;
}
function toggleCI(pid,idx,iidx){
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const it=page.blocks[idx]?.items?.[iidx];if(!it)return;
  it.done=!it.done;save();render();
}

// Bullet/Numbered list item helpers
function updBulletItem(pid,bi,ii,val){
  const p=(S.customPages||[]).find(p=>p.id===pid);if(!p)return;
  if(!p.blocks[bi].items)p.blocks[bi].items=[''];
  p.blocks[bi].items[ii]=val;save();
}
function addBulletItem(pid,bi){
  const p=(S.customPages||[]).find(p=>p.id===pid);if(!p)return;
  if(!p.blocks[bi].items)p.blocks[bi].items=[];
  p.blocks[bi].items.push('');save();render();
}
function delBulletItem(pid,bi,ii){
  const p=(S.customPages||[]).find(p=>p.id===pid);if(!p)return;
  p.blocks[bi].items.splice(ii,1);
  if(!p.blocks[bi].items.length)p.blocks[bi].items=[''];
  save();render();
}

// Toggle block open/close
function toggleBlock(pid,idx){
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const b=page.blocks[idx];if(!b)return;
  b.open=!b.open;save();render();
}

// ─── BLOCK DRAG & DROP ───
let _dragBlockIdx=null,_dragBlockPid=null;
function blockDragStart(e,idx,pid){
  _dragBlockIdx=idx;_dragBlockPid=pid;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging-block');
}
function blockDragEnd(e){
  _dragBlockIdx=null;_dragBlockPid=null;
  document.querySelectorAll('.notion-block-wrap').forEach(el=>{
    el.classList.remove('dragging-block','drag-over-block');
  });
}
function blockDragOver(e,idx,pid){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(_dragBlockPid!==pid)return;
  document.querySelectorAll('.notion-block-wrap').forEach(el=>el.classList.remove('drag-over-block'));
  if(_dragBlockIdx!==idx)e.currentTarget.classList.add('drag-over-block');
}
function blockDrop(e,toIdx,pid){
  e.preventDefault();
  document.querySelectorAll('.notion-block-wrap').forEach(el=>el.classList.remove('drag-over-block'));
  if(_dragBlockPid!==pid||_dragBlockIdx===null||_dragBlockIdx===toIdx)return;
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const from=_dragBlockIdx,to=toIdx;
  const [moved]=page.blocks.splice(from,1);
  page.blocks.splice(to,0,moved);
  _dragBlockIdx=null;_dragBlockPid=null;
  save();render();
}

// ─── KEYBOARD: Enter / Backspace ───
function blockKeyDown(e,el){
  // If slash popup is active, let slashKeyDown handle keys
  if(_slashState&&_slashState.el===el)return;
  const pid=el.dataset.pid||el.closest('[data-pid]')?.dataset.pid;
  const idx=+(el.dataset.idx||el.closest('[data-block-idx]')?.dataset.blockIdx);
  if(pid==null||isNaN(idx))return;
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const b=page.blocks[idx];if(!b)return;
  const isHeading=['h1','h2','h3','heading'].includes(b.type);
  const isText=['text','note','quote'].includes(b.type);

  // Enter key
  if(e.key==='Enter'&&!e.shiftKey){
    // Heading → add text block below
    if(isHeading){
      e.preventDefault();
      addBlock(pid,'text',idx);
      return;
    }
    // Text/note/quote: Shift+Enter = newline (default), Enter = new same-type block
    if(isText){
      e.preventDefault();
      const content=el.value||'';
      const isEmpty=!content.trim();
      addBlock(pid,isEmpty?'text':b.type,idx);
      return;
    }
  }

  // Backspace on empty text-like block → delete block and focus prev
  if(e.key==='Backspace'){
    const val=el.value||'';
    if(!val){
      e.preventDefault();
      if(page.blocks.length<=1)return;
      page.blocks.splice(idx,1);
      save();render();
      // focus previous block
      setTimeout(()=>{
        const prevIdx=Math.max(0,idx-1);
        const prevEl=document.querySelector(`[data-block-idx="${prevIdx}"] textarea,[data-block-idx="${prevIdx}"] input`);
        if(prevEl){prevEl.focus();if(prevEl.tagName==='TEXTAREA'){const l=prevEl.value.length;prevEl.selectionStart=prevEl.selectionEnd=l;}}
      },30);
    }
  }
}

// ─── LIST ITEM KEYBOARD ───
function listItemKeyDown(e,el,pid,blockIdx,itemIdx){
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  const b=page.blocks[blockIdx];if(!b)return;
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    b.items=b.items||[''];
    b.items.splice(itemIdx+1,0,'');
    save();render();
    setTimeout(()=>{
      const inputs=document.querySelectorAll(`[data-block-idx="${blockIdx}"][data-pid="${pid}"] ~ div input, .notion-block-wrap[data-block-idx="${blockIdx}"] input`);
      // find the new input at itemIdx+1
      const allInputs=document.querySelectorAll('.notion-block-wrap input');
      // simpler: re-query the block wrapper
      const wrap=document.querySelector(`.notion-block-wrap[data-block-idx="${blockIdx}"]`);
      if(wrap){const ins=wrap.querySelectorAll('input');if(ins[itemIdx+1])ins[itemIdx+1].focus();}
    },30);
    return;
  }
  if(e.key==='Backspace'&&!el.value){
    e.preventDefault();
    b.items=b.items||[''];
    if(b.items.length<=1){
      // Remove the whole block if only one empty item
      page.blocks.splice(blockIdx,1);
      save();render();
      setTimeout(()=>{
        const prevIdx=Math.max(0,blockIdx-1);
        const prevEl=document.querySelector(`.notion-block-wrap[data-block-idx="${prevIdx}"] textarea,.notion-block-wrap[data-block-idx="${prevIdx}"] input`);
        if(prevEl){prevEl.focus();}
      },30);
    }else{
      b.items.splice(itemIdx,1);
      save();render();
      setTimeout(()=>{
        const wrap=document.querySelector(`.notion-block-wrap[data-block-idx="${blockIdx}"]`);
        if(wrap){const ins=wrap.querySelectorAll('input');const target=ins[Math.max(0,itemIdx-1)];if(target){target.focus();target.selectionStart=target.selectionEnd=target.value.length;}}
      },30);
    }
    return;
  }
}

// ─── SLASH COMMAND ───
let _slashState=null; // {pid,idx,el}
let _slashSelIdx=0;
let _slashFiltered=[];

function slashKeyDown(e,el,pid,idx){
  // Detect '/' at start or line start
  if(e.key==='/' && !_slashState){
    const val=el.value||'';
    const pos=el.selectionStart;
    const before=val.slice(0,pos);
    if(before===''||before.endsWith('\n')){
      _slashState={pid,idx,el,pos};
      _slashSelIdx=0;
      _slashFiltered=[...SLASH_COMMANDS];
      showSlashPopup(el);
      return;
    }
  }
  if(!_slashState||_slashState.el!==el)return;

  if(e.key==='Escape'){e.preventDefault();hideSlashPopup();return;}
  if(e.key==='ArrowDown'){e.preventDefault();_slashSelIdx=(_slashSelIdx+1)%_slashFiltered.length;renderSlashSel();return;}
  if(e.key==='ArrowUp'){e.preventDefault();_slashSelIdx=(_slashSelIdx-1+_slashFiltered.length)%_slashFiltered.length;renderSlashSel();return;}
  if(e.key==='Enter'){
    e.preventDefault();
    const cmd=_slashFiltered[_slashSelIdx];
    if(cmd){confirmSlashCmd(cmd);}
    return;
  }
  if(e.key==='Backspace'){
    // If query becomes empty (just the slash deleted), close
    setTimeout(()=>{
      const val=el.value||'';
      const pos=el.selectionStart;
      const before=val.slice(0,pos);
      const slashPos=before.lastIndexOf('/');
      if(slashPos<0){hideSlashPopup();return;}
      updateSlashFilter(before.slice(slashPos+1));
    },0);
    return;
  }
  // Filter on normal key
  setTimeout(()=>{
    const val=el.value||'';
    const pos=el.selectionStart;
    const before=val.slice(0,pos);
    const slashPos=before.lastIndexOf('/');
    if(slashPos<0){hideSlashPopup();return;}
    updateSlashFilter(before.slice(slashPos+1));
  },0);
}

function updateSlashFilter(query){
  const q=query.toLowerCase();
  _slashFiltered=SLASH_COMMANDS.filter(c=>
    c.label.toLowerCase().includes(q)||c.hint.toLowerCase().includes(q)||c.t.includes(q)
  );
  if(!_slashFiltered.length){hideSlashPopup();return;}
  _slashSelIdx=Math.min(_slashSelIdx,_slashFiltered.length-1);
  renderSlashItems();
}

function showSlashPopup(el){
  let popup=document.getElementById('slash-popup');
  if(!popup){popup=document.createElement('div');popup.id='slash-popup';document.body.appendChild(popup);}
  const rect=el.getBoundingClientRect();
  popup.style.top=`${rect.bottom+4}px`;
  popup.style.left=`${rect.left}px`;
  popup.style.display='block';
  renderSlashItems();
}

function hideSlashPopup(){
  _slashState=null;_slashSelIdx=0;_slashFiltered=[];
  const p=document.getElementById('slash-popup');if(p)p.style.display='none';
}

function renderSlashItems(){
  const popup=document.getElementById('slash-popup');if(!popup)return;
  popup.innerHTML=_slashFiltered.map((c,i)=>`
    <div class="slash-item${i===_slashSelIdx?' sel':''}" onmousedown="slashPickIdx(${i})">
      <span class="slash-item-icon">${c.icon}</span>
      <span class="slash-item-label">${c.label}</span>
      <span class="slash-item-hint">${c.hint}</span>
    </div>`).join('');
}

function renderSlashSel(){
  document.querySelectorAll('.slash-item').forEach((el,i)=>el.classList.toggle('sel',i===_slashSelIdx));
}

function slashPickIdx(i){
  _slashSelIdx=i;
  const cmd=_slashFiltered[i];
  if(cmd)confirmSlashCmd(cmd);
}

function makeBlockDefaults(type,id){
  const o={type,id:id||uid()};
  if(['h1','h2','h3','heading'].includes(type))o.text='';
  else if(['bullet','numbered'].includes(type))o.items=[''];
  else if(type==='divider'){}
  else if(type==='toggle'){o.title='';o.content='';o.open=false;}
  else if(type==='checklist')o.items=[];
  else if(type==='links')o.items=[];
  else o.content='';
  return o;
}

function confirmSlashCmd(cmd){
  if(!_slashState)return;
  const {pid,idx,el}=_slashState;
  hideSlashPopup();
  const page=(S.customPages||[]).find(p=>p.id===pid);if(!page)return;
  // Remove slash + query from textarea value
  const pos=el.selectionStart;
  const val=el.value||'';
  const before=val.slice(0,pos);
  const slashPos=before.lastIndexOf('/');
  const remaining=(val.slice(0,slashPos)+val.slice(pos)).trim();
  // If current block is effectively empty after removing slash query → convert it
  if(!remaining&&page.blocks[idx]){
    page.blocks[idx]=makeBlockDefaults(cmd.t,page.blocks[idx].id);
    save();render();
  }else{
    // Otherwise update block content to remove the slash query, then add new block below
    const b=page.blocks[idx];
    if(b){
      const cleanVal=val.slice(0,slashPos)+val.slice(pos);
      if(b.content!==undefined)b.content=cleanVal;else if(b.text!==undefined)b.text=cleanVal;
    }
    save();
    addBlock(pid,cmd.t,idx);
  }
}

// Close slash popup on outside click
document.addEventListener('mousedown',e=>{
  if(_slashState&&!e.target.closest('#slash-popup')&&e.target!==_slashState?.el){
    hideSlashPopup();
  }
});
// ===DEADLINE REMINDERS===
function checkClientDraftTasks(){
  // 自分が担当の案件でクライアント初稿が明日のものを自動タスク化
  const changed=[];
  if(!S.tasks)S.tasks=[];
  (S.jobs||[]).filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'
    &&getJobWorkerIds(j).includes(SELF_WID)&&j.clientDraftDate)
  .forEach(j=>{
    if(daysUntil(j.clientDraftDate)!==1)return;
    const exists=S.tasks.find(t=>t.sourceJobId===j.id&&t.taskType==='clientDraft'&&!t.deleted);
    if(!exists){
      S.tasks.push({id:uid(),title:`📋 クライアント初稿提出: ${j.title}`,dueDate:j.clientDraftDate,
        sourceJobId:j.id,taskType:'clientDraft',done:false,createdAt:new Date().toISOString()});
      changed.push(j.title);
    }
  });
  // サムネイル納品が2日前のものを自動タスク化
  (S.jobs||[]).filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'
    &&getJobWorkerIds(j).includes(SELF_WID)&&j.thumbnailDate)
  .forEach(j=>{
    if(daysUntil(j.thumbnailDate)!==2)return;
    const exists=S.tasks.find(t=>t.sourceJobId===j.id&&t.taskType==='thumbnail'&&!t.deleted);
    if(!exists){
      S.tasks.push({id:uid(),title:`🖼 サムネイル納品: ${j.title}`,dueDate:j.thumbnailDate,
        sourceJobId:j.id,taskType:'thumbnail',done:false,createdAt:new Date().toISOString()});
      changed.push(j.title+'（サムネイル）');
    }
  });
  if(changed.length){save();toast(`📋 ${changed.length}件の案件をタスクに自動追加しました`);}
}

function checkDeadlineReminders(){
  const td=today();
  const d=new Date();d.setDate(d.getDate()+1);
  const tm=d.toISOString().slice(0,10);
  const items=[];
  S.tasks.filter(t=>!t.deleted&&!t.done&&(t.dueDate===td||t.dueDate===tm)).forEach(t=>items.push({title:t.title,date:t.dueDate,type:'タスク'}));
  S.jobs.filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'&&(j.deliveryDate===td||j.deliveryDate===tm)).forEach(j=>items.push({title:j.title,date:j.deliveryDate,type:'案件'}));
  if(!items.length)return;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  items.forEach(it=>{
    new Notification(`📅 EditFlow 納期リマインダー`,{body:`${it.type}「${it.title}」の期限: ${it.date===td?'今日':'明日'}(${it.date})`});
  });
}
function initReminders(){
  if(typeof Notification!=='undefined'&&Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted')checkDeadlineReminders();});
  }else{
    checkDeadlineReminders();
  }
}
// ===INIT===
updSessionCount();
initPomo();
initReminders();
checkClientDraftTasks();
// ===VERSION CHECK & AUTO-UPDATE===
const APP_VERSION='20260529-30';

render();
function forceAppUpdate(){
  const bust='?v='+Date.now();
  if('caches' in window){
    caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))).then(()=>{
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(regs=>Promise.all(regs.map(r=>r.unregister()))).then(()=>{
          location.href=location.pathname+bust; // キャッシュバスティングURLで再読み込み
        });
      }else{location.href=location.pathname+bust;}
    });
  }else{location.href=location.pathname+bust;}
}
(function(){
  const stored=localStorage.getItem('ef_app_ver');
  if(stored!==APP_VERSION){
    localStorage.setItem('ef_app_ver',APP_VERSION);
    if(stored){
      // ループ防止: sessionStorageで試行回数を管理
      const attempts=parseInt(sessionStorage.getItem('ef_update_attempts')||'0');
      if(attempts<3){
        sessionStorage.setItem('ef_update_attempts',String(attempts+1));
        forceAppUpdate();
      }else{
        // 3回試みても解決しない場合はループを止める
        sessionStorage.removeItem('ef_update_attempts');
        console.warn('Update loop detected, skipping forceAppUpdate');
      }
    }
  }else{
    sessionStorage.removeItem('ef_update_attempts');
  }
})();

// ===SERVICE WORKER===
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/editflow-app/sw.js').then(reg=>{
    reg.update();
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(sessionStorage.getItem('sw_init')){
        sessionStorage.removeItem('sw_init');
        location.reload();
      }else{
        sessionStorage.setItem('sw_init','1');
      }
    });
  }).catch(e=>console.warn('SW:',e));
}
