function schedDate(off){const d=new Date();d.setDate(d.getDate()+off);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function rTasksSchedule(){
  const d=schedDate(SD);
  const isToday=SD===0;
  const totalH=(SE-SS)*PPM;
  const now=new Date(),nowM=now.getHours()*60+now.getMinutes();
  const nowTop=mPos(nowM);
  const hours=[];for(let h=SS/60;h<=SE/60;h++)hours.push(h);
  const tasks=S.tasks.filter(t=>!t.deleted&&t.startTime&&(t.dueDate===d||(!t.dueDate&&isToday)));
  const fixedBlocks=S.fs.map(f=>{
    const sm=tMin(f.s),em=tMin(f.e==='-1'?'24:00':f.e);
    const top=mPos(sm),h=Math.max(18,(em-sm)*PPM);
    return`<div class="fixed-blk" style="top:${top}px;height:${h}px;background:${f.c}18;border-left-color:${f.c}">
      <div class="fixed-blk-title" style="color:${f.c}">${esc(f.t)}</div>
      <div class="fixed-blk-time">${f.s}〜${f.e}</div>
    </div>`;}).join('');
  // タスクブロックデータ
  const taskBlkData=tasks.map(t=>({id:t.id,isSubtask:false,sm:tMin(t.startTime),em:t.endTime?tMin(t.endTime):tMin(t.startTime)+60,task:t,sub:null,subIdx:-1}));
  // サブタスクブロックデータ（startTimeを持つもの）
  const subBlkData=[];
  S.tasks.filter(t=>!t.deleted&&(t.dueDate===d||(!t.dueDate&&isToday))).forEach(t=>{
    (t.subtasks||[]).forEach((s,i)=>{
      if(s.startTime)subBlkData.push({id:`${t.id}::${i}`,isSubtask:true,sm:tMin(s.startTime),em:s.endTime?tMin(s.endTime):tMin(s.startTime)+30,task:t,sub:s,subIdx:i});
    });
  });
  // 全ブロック統合してカラム分け
  const allBlks=[...taskBlkData,...subBlkData].map(b=>({...b,col:0,numCols:1}));
  allBlks.sort((a,b)=>a.sm-b.sm);
  const colEnds=[];
  allBlks.forEach(b=>{let c=colEnds.findIndex(e=>e<=b.sm);if(c<0)c=colEnds.length;colEnds[c]=b.em;b.col=c;});
  allBlks.forEach(b=>{const ov=allBlks.filter(b2=>b2.sm<b.em&&b2.em>b.sm);b.numCols=Math.max(...ov.map(b2=>b2.col+1));});
  const taskBlocks=allBlks.map(({id,isSubtask,sm,em,col,numCols,task:t,sub:s,subIdx})=>{
    const top=mPos(sm),h=Math.max(20,(em-sm)*PPM);
    const colW=44/numCols;
    const left=52+col*colW;
    const right=100-(left+colW)+0.5;
    const isOverlap=numCols>1;
    if(isSubtask){
      return`<div class="task-blk sub-blk${s.done?' done-blk':''}${isOverlap?' overlap-blk':''}" draggable="true"
        style="top:${top}px;height:${h}px;cursor:grab;left:${left}%;right:${right}%;display:flex;flex-direction:column;justify-content:space-between;position:absolute"
        ondragstart="schedDragStart(event,'${id}')"
        title="↳ ${esc(s.title)} (${esc(t.title)})">
        <div style="overflow:hidden">
          <div class="sub-blk-label">↳ ${esc(t.title)}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.title)}</div>
        </div>
        ${isOverlap?`<div class="overlap-badge">×${numCols}</div>`:''}
      </div>`;
    }
    return`<div class="task-blk ${t.done?'done-blk':''}${isOverlap?' overlap-blk':''}" draggable="true"
      style="top:${top}px;height:${h}px;cursor:grab;left:${left}%;right:${right}%;display:flex;flex-direction:column;justify-content:space-between;position:absolute"
      ondblclick="event.stopPropagation();delTask('${t.id}')"
      ondragstart="schedDragStart(event,'${t.id}')"
      title="${esc(t.title)}${isOverlap?` ⚡ ${numCols}件重複`:''} (ダブルクリックで削除)">
      <span onclick="openTaskModal('${t.id}')" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${isOverlap?'⚡ ':''}${esc(t.title)}</span>
      ${isOverlap?`<div class="overlap-badge">×${numCols}</div>`:''}
      ${h>=36&&!isOverlap?`<div style="display:flex;gap:3px;margin-top:2px"><button onclick="event.stopPropagation();splitSchedTask('${t.id}')" style="font-size:9px;padding:1px 4px;background:rgba(255,255,255,.15);border:none;border-radius:3px;color:#fff;cursor:pointer" title="タスクを分割">✂</button></div>`:''}
    </div>`;}).join('');
  const nowLine=(isToday&&nowM>=SS&&nowM<=SE)?`<div class="now-line" style="top:${nowTop}px"></div>`:'';
  // Gcalイベントをタイムラインとサイドパネルへ
  const gcalEvs=gcalEventsForDate(d);
  const gcalTimedBlocks=gcalEvs.filter(e=>e.start?.dateTime).map(e=>{
    const sm=tMin(new Date(e.start.dateTime).toTimeString().slice(0,5));
    const em=e.end?.dateTime?tMin(new Date(e.end.dateTime).toTimeString().slice(0,5)):sm+60;
    const top=mPos(sm),h=Math.max(18,(em-sm)*PPM);
    const timeLbl=new Date(e.start.dateTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+(e.end?.dateTime?'〜'+new Date(e.end.dateTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'');
    return`<div style="position:absolute;top:${top}px;height:${h}px;left:52%;right:0.5%;background:var(--blue)22;border-left:3px solid var(--blue);border-radius:5px;padding:2px 5px;overflow:hidden;pointer-events:none;z-index:1">
      <div style="font-size:10px;color:var(--blue);font-weight:600">📅 ${timeLbl}</div>
      <div style="font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.summary||'(無題)')}</div>
    </div>`;
  }).join('');
  const gcalAllDay=gcalEvs.filter(e=>!e.start?.dateTime);
  // サイドパネル用：未スケジュールのタスク（startTimeなし）
  const allDay=S.tasks.filter(t=>!t.deleted&&(t.dueDate===d||(!t.dueDate&&isToday)));
  const unscheduled=allDay.filter(t=>!t.startTime);
  const undone=unscheduled.filter(t=>!t.done),doneList=unscheduled.filter(t=>t.done);
  // 未完了数（タスク＋未スケジュールサブタスク）
  const undoneSubCount=unscheduled.reduce((s,t)=>{
    const subs=t.subtasks||[];
    return s+subs.filter(sub=>!sub.done&&!sub.startTime).length;
  },0);
  const totalUndone=undone.length+undoneSubCount;
  const DH=`<span class="sched-dh">⠿</span>`;
  const sideItems=[...undone,...doneList].map(t=>{
    const subs=t.subtasks||[];
    const subsDone=subs.filter(s=>s.done).length;
    const progHtml=subs.length?`<span style="font-size:10px;color:var(--t3);font-weight:400">${subsDone}/${subs.length}</span>`:'';
    // サブタスク行（未スケジュールのみ、完了は最後）
    const undoneSubs=subs.map((s,i)=>({s,i})).filter(({s})=>!s.done&&!s.startTime);
    const doneSubs=subs.map((s,i)=>({s,i})).filter(({s})=>s.done&&!s.startTime);
    const subRows=[...undoneSubs,...doneSubs].map(({s,i})=>`
      <div class="sched-side-sub${s.done?' done-sub':''}" draggable="true"
        ondragstart="sideTaskDragStart(event,'${t.id}::${i}')"
        ondragend="sideSubDragEnd(event)"
        title="↳ ${esc(s.title)}（ドラッグでスケジュールへ）">
        ${DH}
        <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.title)}</div>
        <div style="width:12px;height:12px;border-radius:3px;border:1.5px solid ${s.done?'var(--purple)':'var(--border)'};background:${s.done?'var(--purple)':'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="event.stopPropagation();toggleSub('${t.id}',${i})">
          ${s.done?'<svg width="8" height="8" viewBox="0 0 8 8"><polyline points="1,4 3,6 7,2" stroke="#fff" stroke-width="1.5" fill="none"/></svg>':''}
        </div>
      </div>`).join('');
    return`<div class="sched-side-task${t.done?' done-side':''}" draggable="true"
      ondragstart="sideTaskDragStart(event,'${t.id}')"
      ondragend="sideTaskDragEnd(event)"
      onclick="openTaskModal('${t.id}')">
      ${DH}
      <div style="flex:1;min-width:0">
        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:2px;flex-wrap:wrap">
          ${t.priority?`<span style="font-size:10px">${t.priority==='high'?'🔴 高':'🟡 中'}</span>`:''}
          ${progHtml}
        </div>
      </div>
    </div>${subRows}`;}).join('');
  const sidePanel=`<div class="sched-side-panel" id="sched-side-panel"
    ondragover="schedSideDragOver(event)"
    ondragleave="schedSideDragLeave(event)"
    ondrop="schedSideDrop(event,'${d}')">
    <div class="sched-side-hdr">
      <span>📋 未配置タスク</span>
      <span style="font-size:11px;background:var(--border);padding:1px 6px;border-radius:10px">${totalUndone}</span>
    </div>
    ${gcalAllDay.map(e=>`<div style="padding:4px 8px;border-left:3px solid var(--blue);margin-bottom:4px;background:var(--blue)11;border-radius:3px">
      <div style="font-size:10px;color:var(--blue)">📅 終日</div>
      <div style="font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.summary||'(無題)')}</div>
    </div>`).join('')}
    ${sideItems||(!gcalAllDay.length?`<div style="font-size:12px;color:var(--t3);text-align:center;padding:16px 8px">未スケジュールの<br>タスクはありません 🎉</div>`:'')}
    <div style="font-size:10px;color:var(--t3);text-align:center;padding:6px 8px 8px;border-top:1px solid var(--border);margin-top:4px">⠿ をドラッグしてスケジュールへ配置</div>
  </div>`;
  const dateLabel=new Date(d+'T00:00:00').toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'long'});
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn btn-g btn-sm" onclick="SD--;render()">‹</button>
    <div style="font-size:13px;font-weight:600">${dateLabel}${SD===0?' (今日)':SD===1?' (明日)':''}</div>
    <button class="btn btn-g btn-sm" onclick="SD++;render()">›</button>
    ${SD!==0?`<button class="btn btn-g btn-sm" onclick="SD=0;render()">今日</button>`:''}
  </div>
  <div style="display:flex;gap:6px">
    <button class="btn btn-g btn-sm" onclick="resetSchedTimes('${d}')" title="この日の全タスクの開始・終了時間をクリア">⏱ 時間リセット</button>
    <button class="btn btn-p btn-sm" onclick="openTaskModal(null,'${d}',true)">＋ 時間付きタスク追加</button>
  </div>
</div>
<div class="sched-layout">
  ${sidePanel}
  <div class="sched-col">
    <div class="sched-wrap" id="sched-main-wrap"
      ondragover="schedDragOver(event)"
      ondrop="schedDrop(event,'${d}')">
      <div class="sched-hours" style="height:${totalH}px">
        ${hours.map(h=>`<div class="hlabel" style="top:${mPos(h*60)}px">${String(h).padStart(2,'0')}:00</div>`).join('')}
      </div>
      <div class="sched-main" style="height:${totalH}px">
        ${hours.map(h=>`<div class="hline" style="top:${mPos(h*60)}px"></div><div class="hline-half" style="top:${mPos(h*60+30)}px"></div>`).join('')}
        ${fixedBlocks}${taskBlocks}${gcalTimedBlocks}${nowLine}
      </div>
    </div>
    <div class="sched-add-hint">↑ スケジュールは設定から編集できます</div>
  </div>
</div>`;
}

<button class="btn btn-p btn-sm" onclick="closeModal();openTaskModal(null,'${d}')">＋ この日にタスク追加</button>`);

// ===SCHEDULE D&D===
// IDフォーマット: タスク → "taskId" / サブタスク → "taskId::subIdx"
let _schedDragId=null,_schedDragOffset=0;
function _parseSchedId(id){
  if(!id)return{isSub:false,taskId:id,subIdx:-1};
  const sep=id.indexOf('::');
  if(sep<0)return{isSub:false,taskId:id,subIdx:-1};
  return{isSub:true,taskId:id.slice(0,sep),subIdx:parseInt(id.slice(sep+2))};
}
function schedDragStart(e,id){
  _schedDragId=id;
  e.dataTransfer.effectAllowed='move';
  const rect=e.currentTarget.getBoundingClientRect();
  _schedDragOffset=Math.round((e.clientY-rect.top)/PPM/15)*15;
}
function schedDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function schedDrop(e,date){
  e.preventDefault();
  if(!_schedDragId)return;
  const wrap=document.getElementById('sched-main-wrap');
  if(!wrap)return;
  const main=wrap.querySelector('.sched-main');
  const rect=main.getBoundingClientRect();
  const y=e.clientY-rect.top;
  const mins=Math.round(y/PPM/15)*15-_schedDragOffset+SS;
  const {isSub,taskId,subIdx}=_parseSchedId(_schedDragId);
  const t=S.tasks.find(t=>t.id===taskId);
  if(!t)return;
  if(isSub){
    const s=(t.subtasks||[])[subIdx];
    if(!s)return;
    const dur=s.endTime?tMin(s.endTime)-tMin(s.startTime):30;
    s.startTime=mToT(Math.max(SS,Math.min(SE-15,mins)));
    s.endTime=mToT(Math.max(SS+15,Math.min(SE,mins+dur)));
    t.dueDate=date;
    save();render();_schedDragId=null;_schedDragOffset=0;
    toast('サブタスクをスケジュールに配置しました');
  }else{
    const dur=t.endTime?tMin(t.endTime)-tMin(t.startTime):60;
    t.startTime=mToT(Math.max(SS,Math.min(SE-15,mins)));
    t.endTime=mToT(Math.max(SS+15,Math.min(SE,mins+dur)));
    t.dueDate=date;
    save();render();_schedDragId=null;_schedDragOffset=0;
    toast('スケジュールを更新しました');
  }
}
// ===SCHEDULE SIDE PANEL D&D===
function sideTaskDragStart(e,id){
  _schedDragId=id;
  e.dataTransfer.effectAllowed='move';
  _schedDragOffset=0;
  e.currentTarget.classList.add('dragging');
}
function sideTaskDragEnd(e){
  e.currentTarget.classList.remove('dragging');
}
function sideSubDragEnd(e){
  e.currentTarget.classList.remove('dragging');
}
function schedSideDragOver(e){
  e.preventDefault();
  document.getElementById('sched-side-panel')?.classList.add('drag-over');
}
function schedSideDragLeave(e){
  document.getElementById('sched-side-panel')?.classList.remove('drag-over');
}
function schedSideDrop(e,date){
  e.preventDefault();
  document.getElementById('sched-side-panel')?.classList.remove('drag-over');
  if(!_schedDragId)return;
  const {isSub,taskId,subIdx}=_parseSchedId(_schedDragId);
  const t=S.tasks.find(t=>t.id===taskId);
  if(!t){_schedDragId=null;return;}
  if(isSub){
    const s=(t.subtasks||[])[subIdx];
    if(s){s.startTime=null;s.endTime=null;t.dueDate=date;save();render();toast('サブタスクをスケジュールから外しました');}
  }else{
    t.startTime=null;t.endTime=null;t.dueDate=date;save();render();toast('スケジュールから外しました');
  }
  _schedDragId=null;
}
// ===TASK LIST D&D===
let _taskDragId=null;
function taskDragStart(e,id){_taskDragId=id;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging');}
function taskDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.task-item.drag-over,.fs-drop-zone.fs-drag-over').forEach(el=>el.classList.remove('drag-over','fs-drag-over'));}
function fsBlockDragOver(e,i){e.preventDefault();e.stopPropagation();document.getElementById('fs-block-'+i)?.classList.add('fs-drag-over');}
function fsBlockDragLeave(e,i){document.getElementById('fs-block-'+i)?.classList.remove('fs-drag-over');}
function fsBlockDrop(e,startTime,i){
  e.preventDefault();e.stopPropagation();
  document.getElementById('fs-block-'+i)?.classList.remove('fs-drag-over');
  const id=_taskDragId||_wdayDragId;
  if(!id)return;
  const t=S.tasks.find(t=>t.id===id);
  if(!t){_taskDragId=null;_wdayDragId=null;return;}
  t.startTime=startTime;
  t.dueDate=today();
  save();render();toast(`⏰ ${esc(t.title)} を ${startTime} に割り当てました`);
  _taskDragId=null;_wdayDragId=null;
}
function taskListDrop(e){
  e.preventDefault();
  if(!_taskDragId)return;
  const targetItem=e.target.closest('.task-item');
  if(!targetItem)return;
  const targetId=targetItem.id.replace('ti-','');
  if(_taskDragId===targetId){_taskDragId=null;return;}
  const from=S.tasks.findIndex(t=>t.id===_taskDragId);
  const to=S.tasks.findIndex(t=>t.id===targetId);
  if(from<0||to<0){_taskDragId=null;return;}
  const [item]=S.tasks.splice(from,1);S.tasks.splice(to,0,item);
  save();render();_taskDragId=null;
}
let _wdayDragId=null;
function wdayDragStart(e,id){_wdayDragId=id;e.dataTransfer.effectAllowed='move';}
function wdayDrop(e,date){
  e.preventDefault();
  if(!_wdayDragId)return;
  const t=S.tasks.find(t=>t.id===_wdayDragId);
  if(t&&t.dueDate!==date){t.dueDate=date;save();render();toast('タスクを移動しました');}
  _wdayDragId=null;
}
function wdayInnerDragOver(e,targetId){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.wtask.drag-over').forEach(el=>el.classList.remove('drag-over'));
  document.getElementById('wt-'+targetId)?.classList.add('drag-over');
}
function wdayInnerDrop(e,targetId,date){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.wtask.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(!_wdayDragId||_wdayDragId===targetId){_wdayDragId=null;return;}
  const src=S.tasks.find(t=>t.id===_wdayDragId);
  if(!src){_wdayDragId=null;return;}
  if(src.dueDate===date){
    const from=S.tasks.findIndex(t=>t.id===_wdayDragId);
    const to=S.tasks.findIndex(t=>t.id===targetId);
    if(from>=0&&to>=0){const[item]=S.tasks.splice(from,1);S.tasks.splice(to,0,item);}
  }else{src.dueDate=date;}
  save();render();_wdayDragId=null;
}
// ===PROJECTS===
function sortJobs(jobs){
  switch(JOB_SORT){
    case 'deadline': return [...jobs].sort((a,b)=>(a.deliveryDate||'9999')>(b.deliveryDate||'9999')?1:-1);
    case 'f1date': return [...jobs].sort((a,b)=>(a.editorDraftDate||'9999')>(b.editorDraftDate||'9999')?1:-1);
    case 'clientdraft': return [...jobs].sort((a,b)=>(a.clientDraftDate||'9999')>(b.clientDraftDate||'9999')?1:-1);
    case 'f1worker': return [...jobs].sort((a,b)=>{const wa=getJobWorkerNames(a);const wb=getJobWorkerNames(b);return wa>wb?1:-1;});
    case 'status': return [...jobs].sort((a,b)=>a.status>b.status?1:-1);
    case 'title': return [...jobs].sort((a,b)=>a.title>b.title?1:-1);
    default: return jobs;
  }
}

function rProjClients(){
  const clients=S.clients.filter(c=>!c.deleted);
  if(!clients.length)return`<div class="empty"><div class="empty-icon">👤</div><div class="empty-title">クライアントなし</div><div style="color:var(--t2)">「＋ クライアント追加」から登録してください</div></div>`;

  // 全クライアントの集計
  const allActiveJobs=S.jobs.filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル');
  const allDoneJobs=S.jobs.filter(j=>!j.deleted&&j.status==='完了');
  const totalRevenue=allDoneJobs.reduce((s,j)=>s+jobMainIn(j),0);
  const totalProfit=allDoneJobs.reduce((s,j)=>s+jobMainProfit(j),0);
  const totalPending=allDoneJobs.filter(j=>!j.paymentDate).reduce((s,j)=>s+jobMainIn(j),0);
  const trialClients=clients.filter(c=>c.isTrial);
  const contractClients=clients.filter(c=>!c.isTrial);

  // ソート: トライアル → 成約、その中でアクティブ案件数順
  const sorted=[...clients].sort((a,b)=>{
    const aJobs=allActiveJobs.filter(j=>j.clientId===a.id).length;
    const bJobs=allActiveJobs.filter(j=>j.clientId===b.id).length;
    if(a.isTrial!==b.isTrial)return a.isTrial?-1:1;
    return bJobs-aJobs;
  });

  return`
<div class="card" style="margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap">
  <div><div style="font-size:11px;color:var(--t2)">総クライアント数</div><div style="font-size:20px;font-weight:700">${clients.length}社</div></div>
  <div><div style="font-size:11px;color:var(--amber)">トライアル</div><div style="font-size:20px;font-weight:700;color:var(--amber)">${trialClients.length}社</div></div>

function jobTotalIn(j){
  const subs=j.subtasks||[];
  if(subs.some(s=>s.unitPrice>0))return subs.reduce((s,sub)=>s+(sub.unitPrice||0),0);
  return j.unitPrice||j.profit||0;
}
const SELF_WID='__self';
function getJobWorkerIds(j){return j.workerIds||(j.workerId?[j.workerId]:[]);}
function getJobWorkerNames(j){
  const ids=getJobWorkerIds(j);
  if(!ids.length)return'';
  return ids.map(id=>id===SELF_WID?'自分':(S.workers.find(w=>w.id===id)?.name||'')).filter(Boolean).join(', ');
}
function jobTotalOut(j){
  const subs=j.subtasks||[];
  if(subs.some(s=>s.unitPrice>0||s.workerPay>0))
    return subs.filter(s=>s.workerId!==SELF_WID).reduce((sum,s)=>sum+(s.workerPay||0),0);
  const wids=getJobWorkerIds(j);
  if(!wids.length||wids.every(id=>id===SELF_WID))return 0;
  return j.workerPay||0;
}
function jobProfit(j){return jobTotalIn(j)-jobTotalOut(j);}
// 利益ページ用：サブタスクを含まずメインタスクの金額のみ
function jobMainIn(j){return j.unitPrice||j.profit||0;}
function jobMainOut(j){const wids=getJobWorkerIds(j);if(!wids.length||wids.every(id=>id===SELF_WID))return 0;return j.workerPay||0;}
function jobMainProfit(j){return jobMainIn(j)-jobMainOut(j);}
function markJobPaid(id){
  const j=S.jobs.find(j=>j.id===id);if(!j)return;
  j.paymentDate=today();
  save();render();toast('💰 入金済みにしました');
}
function unmarkJobPaid(id){
  const j=S.jobs.find(j=>j.id===id);if(!j)return;
  if(!confirm('入金済みを取り消しますか？'))return;
  j.paymentDate=null;
  save();render();toast('入金済みを取り消しました');
}
function markJobPayout(id){

  j.payoutDate=today();
  save();render();toast('💳 支払い済みにしました');
}

function getPayEntries(month){
  const entries=[];
  S.jobs.filter(j=>!j.deleted).forEach(j=>{
    const subs=j.subtasks||[];
    const hasPricedSubs=subs.some(s=>s.unitPrice>0||s.workerPay>0);
    if(hasPricedSubs){
      subs.forEach(s=>{
        if(!s.workerPay||s.workerId===SELF_WID)return;
        const pd=s.payoutDate||j.payoutDate;
        if(!pd?.startsWith(month))return;
        entries.push({jobId:j.id,jobTitle:j.title,label:esc(s.title),workerId:s.workerId||'__none',workerPay:s.workerPay,payoutDate:pd});
      });
    }else{
      const wids=getJobWorkerIds(j);if(!j.workerPay||(!wids.length||wids.every(id=>id===SELF_WID)))return;
      if(!j.payoutDate?.startsWith(month))return;
      entries.push({jobId:j.id,jobTitle:j.title,label:esc(j.title),workerId:j.workerId||'__none',workerPay:j.workerPay,payoutDate:j.payoutDate});
    }
  });
  return entries;
}

function rProjWorker(){
  const workers=S.workers||[];
  const allJobs=S.jobs.filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル');
  // サブタスクを持つジョブも含めて全件取得（完了・キャンセル以外）
  const allJobsForSubs=S.jobs.filter(j=>!j.deleted);

  // ワーカーIDに紐づくサブタスク一覧を構築
  function subsForWorker(wid){
    const result=[];
    allJobsForSubs.forEach(j=>{
      (j.subtasks||[]).forEach((s,i)=>{
        if(s.done)return;
        if(s.workerId===wid)result.push({job:j,sub:s,idx:i});
      });
    });
    return result;
  }

  function rSubItem({job,sub,idx}){
    const uc=urgCls(sub.deliveryDate||sub.editorDraftDate);
    return`<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;background:var(--cdim);border:1px solid var(--cyan);margin:4px 0;cursor:pointer" onclick="openJobModal('${job.id}')">
      <span style="font-size:11px;color:var(--cyan);flex-shrink:0;margin-top:2px">└</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--t3)">${esc(job.title)}</span>
          <span style="color:var(--t3);font-size:11px">›</span>
          <span style="font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(sub.title)}</span>
          ${sub.status?`<span class="badge ${SCOLBG[sub.status]||'bc'}" style="font-size:10px">${sub.status}</span>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;font-size:11px;color:var(--t2)">
          ${sub.editorDraftDate?`<span>✏️ 初稿: <span class="${urgCls(sub.editorDraftDate)}">${sub.editorDraftDate}</span></span>`:''}
          ${sub.deliveryDate?`<span>📅 納品: <span class="${uc}">${sub.deliveryDate}</span></span>`:''}
          ${sub.unitPrice?`<span style="color:var(--blue)">¥${sub.unitPrice.toLocaleString()}</span>`:''}
        </div>
      </div>
    </div>`;
  }

  const groups=[];
  workers.forEach(w=>{
    const jobs=sortJobs(allJobs.filter(j=>getJobWorkerIds(j).includes(w.id)));
    const subs=subsForWorker(w.id);
    groups.push({label:w.name,id:w.id,jobs,subs});
  });
  const selfJobs=sortJobs(allJobs.filter(j=>getJobWorkerIds(j).includes(SELF_WID)));
  const selfSubs=subsForWorker(SELF_WID);
  if(selfJobs.length||selfSubs.length)groups.unshift({label:'自分',id:SELF_WID,jobs:selfJobs,subs:selfSubs});
  const noWorker=sortJobs(allJobs.filter(j=>getJobWorkerIds(j).length===0));
  const noWorkerSubs=subsForWorker(null);
  groups.push({label:'担当なし',id:null,jobs:noWorker,subs:[]});
  if(!allJobs.length)return`<div class="empty"><div class="empty-icon">👤</div><div class="empty-title">進行中の案件なし</div></div>`;
  return groups.filter(g=>g.jobs.length||g.subs.length||(g.id===null&&noWorker.length)).map(g=>`<div class="client-card" style="margin-bottom:14px">
  <div class="client-hdr">
    <div class="client-name">👤 ${esc(g.label)}
      <span style="font-size:13px;color:var(--t2);font-weight:400">
        ${g.jobs.length?`${g.jobs.length}件`:''}${g.subs.length?`${g.jobs.length?' · ':''}サブタスク${g.subs.length}件`:''}
      </span>
    </div>
  </div>
  ${g.jobs.map(j=>rJobItem(j)).join('')}
  ${g.subs.length?`<div style="margin-top:${g.jobs.length?'8':'0'}px">
    ${g.jobs.length?`<div style="font-size:11px;color:var(--t3);font-weight:700;margin:6px 0 4px;padding-top:6px;border-top:1px solid var(--border)">📋 サブタスク</div>`:''}
    ${g.subs.map(s=>rSubItem(s)).join('')}
  </div>`:''}
  ${!g.jobs.length&&!g.subs.length?`<div style="font-size:12px;color:var(--t3);padding:6px 0">担当案件なし</div>`:''}
</div>`).join('');
}

  </div>`:''}
  ${g.woop?`<div class="woop-section">

  if(div)KV=div.id; else KV=null;

  const divTabs=divs.map(d=>`<button class="btn btn-sm ${KV===d.id?'btn-p':'btn-g'}" onclick="KV='${d.id}';render()" style="flex-shrink:0">${esc(d.name)}</button>`).join('');

  const horizonTabs=[['5y','🗓 5年後'],['1y','📆 1年後'],['6m','📅 半年後'],['3m','🗒 3ヶ月後'],['1m','📌 今月'],['1w','⚡ 今週']];
  const innerTabs=[['kgi','🎯 KGI'],['kpi','📈 KPI'],['issues','⚠️ イシュー'],['tasks','✅ タスク']];

  const tabBar=allTabs.map(([k,l])=>`<div class="stab${KT===k?' act':''}" onclick="KT='${k}';render()">${l}</div>`).join('');

    content=rHorizonTab(div,KT);
  } else if(KT==='kgi'){
    content=rKgiTab(div);

const HORIZON_LABELS={'5y':'5年後','1y':'1年後','6m':'半年後','3m':'3ヶ月後','1m':'今月','1w':'今週'};
const HORIZON_DESC={'5y':'5年後のビジョン・長期目標','1y':'1年後の目標・年間KPI','6m':'半年後の目標・中期KPI','3m':'3ヶ月後の目標・四半期KPI','1m':'今月の目標・月次KPI','1w':'今週の目標・振り返り'};

function rHorizonTab(div,period){
  if(!div.horizons)div.horizons={};
  if(!div.horizons[period])div.horizons[period]={goal:'',kpis:[],updatedAt:null};
  const h=div.horizons[period];
  const label=HORIZON_LABELS[period]||period;
  const desc=HORIZON_DESC[period]||'';
  const kpis=h.kpis||[];
  const kpiRows=kpis.length===0
    ?`<div style="text-align:center;padding:16px;color:var(--t2);font-size:13px">KPIがまだありません</div>`
    :kpis.map(k=>{
      const pct=k.target>0?Math.min(100,Math.round((k.current||0)/k.target*100)):0;
      const col=pct>=100?'green':pct>=60?'blue':pct>=30?'amber':'red';
      const colClass=pct>=100?'bg':pct>=60?'bb':pct>=30?'ba':'br';
      return `<div class="card card-sm" style="margin-bottom:8px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <div style="flex:1;font-weight:600;font-size:14px">${esc(k.title)}</div>
    <button class="btn btn-g btn-xs btn-red" onclick="delHorizonKpi('${div.id}','${period}','${k.id}')">🗑</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <div style="flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden">
      <div style="height:100%;background:var(--${col});width:${pct}%;border-radius:4px;transition:width .4s"></div>
    </div>
    <span class="badge ${colClass}" style="flex-shrink:0">${pct}%</span>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--t2);align-items:center">
    <span>現状: <input id="hz-kpi-cur-${k.id}" type="number" value="${k.current||0}" style="width:70px;padding:2px 6px;border:1px solid var(--border);border-radius:6px;background:var(--card2);color:var(--text);font-size:12px"></span>
    <span>目標: <b style="color:var(--text)">${k.target||0}${esc(k.unit||'')}</b></span>
    ${k.unit?`<span>単位: <b style="color:var(--text)">${esc(k.unit)}</b></span>`:''}
  </div>
</div>`;
    }).join('');

  return`<div style="margin-bottom:12px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <div style="font-size:18px;font-weight:700;color:var(--pl)">${label}</div>
    <div style="font-size:12px;color:var(--t2)">${desc}</div>
    ${h.updatedAt?`<span class="badge bk" style="font-size:11px">最終更新: ${h.updatedAt}</span>`:''}
  </div>
</div>
<div class="card" style="margin-bottom:12px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
    <div class="fl">🎯 ${label}の大きな目標・ビジョン</div>
    <span id="hz-goal-saved-${div.id}-${period}" style="font-size:11px;color:var(--green);opacity:0;transition:opacity .5s">✅ 保存済み</span>
  </div>
  <textarea id="hz-goal-${div.id}-${period}" rows="4" placeholder="例：〇〇を実現し、月収〇〇万円を達成する" style="width:100%;box-sizing:border-box" oninput="autoSaveHorizonGoal('${div.id}','${period}')">${esc(h.goal||'')}</textarea>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
  ${secTitle('📈 KPI指標')}
  <button class="btn btn-p btn-sm" onclick="addHorizonKpi('${div.id}','${period}')">＋ KPI追加</button>
</div>
${kpiRows}
<div style="display:flex;justify-content:flex-end;margin-top:14px">
  <button class="btn btn-p" onclick="saveHorizon('${div.id}','${period}')">✅ 振り返りを保存</button>
</div>`;
}

let _horizonGoalTimer=null;
function autoSaveHorizonGoal(divId,period){
  clearTimeout(_horizonGoalTimer);
  _horizonGoalTimer=setTimeout(()=>{
    const div=S.divisions.find(d=>d.id===divId);
    if(!div)return;
    if(!div.horizons)div.horizons={};
    if(!div.horizons[period])div.horizons[period]={goal:'',kpis:[]};
    const goalEl=document.getElementById('hz-goal-'+divId+'-'+period);
    if(!goalEl)return;
    div.horizons[period].goal=goalEl.value;
    save();
    const indicator=document.getElementById('hz-goal-saved-'+divId+'-'+period);
    if(indicator){indicator.style.opacity='1';setTimeout(()=>indicator.style.opacity='0',2000);}
  },800);
}
function saveHorizon(divId,period){
  const div=S.divisions.find(d=>d.id===divId);
  if(!div)return;
  if(!div.horizons)div.horizons={};
  if(!div.horizons[period])div.horizons[period]={goal:'',kpis:[]};
  const goalEl=document.getElementById('hz-goal-'+divId+'-'+period);
  if(goalEl)div.horizons[period].goal=goalEl.value;
  (div.horizons[period].kpis||[]).forEach(k=>{
    const curEl=document.getElementById('hz-kpi-cur-'+k.id);
    if(curEl)k.current=parseFloat(curEl.value)||0;
  });
  div.horizons[period].updatedAt=today();
  save();
  toast('✅ 振り返りを保存しました');
  render();
}

function confirmAddHorizonKpi(divId,period){

function delHorizonKpi(divId,period,kpiId){
  if(!confirm('このKPIを削除しますか？'))return;

  div.horizons[period].kpis=(div.horizons[period].kpis||[]).filter(k=>k.id!==kpiId);
  save();render();toast('KPIを削除しました');
}

function rKpiTab(div){
  const kpis=(div.kpis||[]).filter(k=>!k.deleted);
  const kgis=(div.kgis||[]).filter(k=>!k.deleted);
  const cards=kpis.length===0
    ?`<div class="card" style="text-align:center;padding:24px;color:var(--t2)">KPIがまだありません</div>`
    :kpis.map(k=>{
      const pct=k.targetValue>0?Math.min(100,Math.round((k.currentValue||0)/k.targetValue*100)):0;

function promoteWorkerToTrial(id){
  const w=S.workers.find(w=>w.id===id);if(!w)return;
  w.employStatus='trial';
  save();render();toast(`🎬 ${w.name} のトライアルを開始しました`);
}
function promoteWorkerToHired(id){
  const w=S.workers.find(w=>w.id===id);if(!w)return;
  if(!confirm(`${w.name} を本採用にしますか？`))return;
  w.employStatus='hired';
  if(!S.logs)S.logs=[];
  S.logs.push({id:uid(),type:'hire',date:today(),title:w.name,result:'内定',note:'本採用に昇格',createdAt:new Date().toISOString()});
  save();render();toast(`👤 ${w.name} を本採用にしました`);
}
function rWorkers(){
  const workers=S.workers||[];
  const activeJobs=S.jobs.filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'&&j.status!=='案件掲載中');
  const allJobs=S.jobs.filter(j=>!j.deleted);
  function subsForWorker(wid){
    const result=[];
    allJobs.forEach(j=>{
      (j.subtasks||[]).forEach((s,i)=>{
        if(s.done||s.status==='完了'||s.status==='キャンセル')return;
        if(s.workerId===wid)result.push({job:j,sub:s,idx:i});
      });
    });
    return result;
  }
  function rWorkerSubItem({job,sub}){
    return`<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:8px;background:var(--cdim);border:1px solid var(--cyan);margin:4px 0;cursor:pointer" onclick="openJobModal('${job.id}')">
      <span style="font-size:11px;color:var(--cyan);flex-shrink:0;margin-top:2px">└</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--t3)">${esc(job.title)}</span>
          <span style="color:var(--t3);font-size:11px">›</span>
          <span style="font-size:13px;font-weight:600;color:var(--text)">${esc(sub.title)}</span>
          ${sub.status?`<span class="badge ${SCOLBG[sub.status]||'bc'}" style="font-size:10px">${sub.status}</span>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;font-size:11px;color:var(--t2)">
          ${sub.editorDraftDate?`<span>✏️ 初稿: ${sub.editorDraftDate}</span>`:''}
          ${sub.deliveryDate?`<span>📅 納品: ${sub.deliveryDate}</span>`:''}
        </div>
      </div>
    </div>`;
  }

  function rWorkerCard(w, showActions=true){
    const myJobs=activeJobs.filter(j=>j.workerId===w.id);
    const mySubs=subsForWorker(w.id);
    const totalCount=myJobs.length+mySubs.length;
    const pastPaid=S.jobs.filter(j=>!j.deleted&&j.workerId===w.id&&j.payoutDate).reduce((s,j)=>s+jobTotalOut(j),0);
    const isProspect=w.employStatus==='prospect';
    const isTrial=(w.employStatus||'trial')==='trial';
    return`<div class="card" style="margin-bottom:12px;border-left:3px solid ${isProspect?'var(--cyan)':isTrial?'var(--amber)':'var(--green)'}">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:16px;font-weight:700">${esc(w.name)}</span>
        ${w.affiliation?`<span style="font-size:12px;color:var(--t2)">・${esc(w.affiliation)}</span>`:''}
        <span class="badge ${isProspect?'bc':isTrial?'ba':'bg'}" style="font-size:10px">${isProspect?'📋 採用予定':isTrial?'🔶 トライアル':'✅ 本採用'}</span>
      </div>
      ${w.skills?`<div style="font-size:12px;color:var(--t2);margin-top:4px">🎨 ${esc(w.skills)}</div>`:''}
      ${w.contact?`<div style="font-size:12px;color:var(--blue);margin-top:2px">📧 ${esc(w.contact)}</div>`:''}
      ${w.workConditions?`<div style="font-size:12px;color:var(--t2);margin-top:2px">📋 ${esc(w.workConditions)}</div>`:''}
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
      ${isProspect?`<button class="btn btn-p btn-sm" onclick="promoteWorkerToTrial('${w.id}')">🎬 トライアル開始</button>`:''}
      ${isTrial?`<button class="btn btn-g btn-sm" style="color:var(--green)" onclick="promoteWorkerToHired('${w.id}')">✅ 本採用にする</button>`:''}
      <button class="btn btn-g btn-sm" onclick="openWorkerEditModal('${w.id}')">✏️ 編集</button>
    </div>
  </div>
  ${!isProspect?`<div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
    <div><div style="font-size:11px;color:var(--t2)">担当中</div><div style="font-size:18px;font-weight:700;color:var(--blue)">${totalCount}件</div></div>
    ${w.minFee?`<div><div style="font-size:11px;color:var(--t2)">最低依頼料</div><div style="font-size:18px;font-weight:700;color:var(--green)">¥${Number(w.minFee).toLocaleString()}</div></div>`:''}
    ${pastPaid?`<div><div style="font-size:11px;color:var(--t2)">支払い累計</div><div style="font-size:18px;font-weight:700;color:var(--amber)">¥${pastPaid.toLocaleString()}</div></div>`:''}
  </div>`:''}
  ${isProspect&&w.minFee?`<div style="margin-top:8px;font-size:12px;color:var(--t2)">最低依頼料 <span style="color:var(--green);font-weight:700">¥${Number(w.minFee).toLocaleString()}</span></div>`:''}
  ${!isProspect&&totalCount?`<div style="margin-top:10px">
    ${myJobs.map(j=>`<div class="job-item" onclick="openJobModal('${j.id}')"><span class="badge ${SCOLBG[j.status]||'bk'}">${j.status}</span><span class="job-title">${esc(j.title)}</span>${j.deliveryDate?`<span style="font-size:11px;color:var(--t2)">📅 ${j.deliveryDate}</span>`:''}</div>`).join('')}
    ${mySubs.length?`${myJobs.length?`<div style="font-size:11px;color:var(--t3);font-weight:700;margin:6px 0 4px;padding-top:6px;border-top:1px solid var(--border)">📋 サブタスク</div>`:''}${mySubs.map(s=>rWorkerSubItem(s)).join('')}`:''}
  </div>`:''}
</div>`;
  }

  const prospectWorkers=workers.filter(w=>w.employStatus==='prospect');
  const trialWorkers=workers.filter(w=>(w.employStatus||'trial')==='trial');
  const hiredWorkers=workers.filter(w=>w.employStatus==='hired');

  return`<div class="ph">
  <div class="ph-title">ワーカー管理</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-p" onclick="openAddWorkerModal()">＋ ワーカー追加</button>
    <div style="display:flex;gap:10px;font-size:12px;color:var(--t2)">
      ${prospectWorkers.length?`<span class="badge bc">📋 採用予定 ${prospectWorkers.length}</span>`:''}
      ${trialWorkers.length?`<span class="badge ba">🔶 トライアル ${trialWorkers.length}</span>`:''}
      ${hiredWorkers.length?`<span class="badge bg">✅ 本採用 ${hiredWorkers.length}</span>`:''}
    </div>
  </div>
</div>
${!workers.length?`<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">ワーカーがいません</div><div style="color:var(--t2)">「＋ ワーカー追加」から登録してください</div></div>`:''}

${prospectWorkers.length?`<div class="section-ttl" style="color:var(--cyan)">📋 採用予定ワーカー (${prospectWorkers.length})</div>
${prospectWorkers.map(w=>rWorkerCard(w)).join('')}`:''}

${trialWorkers.length?`<div class="section-ttl" style="color:var(--amber)">🔶 トライアル中 (${trialWorkers.length})</div>
${trialWorkers.map(w=>rWorkerCard(w)).join('')}`:''}

${hiredWorkers.length?`<div class="section-ttl" style="color:var(--green)">✅ 本採用ワーカー (${hiredWorkers.length})</div>
${hiredWorkers.map(w=>rWorkerCard(w)).join('')}`:''}
`;
}

  const affs=[...new Set((S.workers||[]).map(w=>w.affiliation).filter(Boolean))];
  return`<datalist id="wm-aff-list">${affs.map(a=>`<option value="${esc(a)}">`).join('')}</datalist>`;

function saveWorkerModal(id){
  const name=document.getElementById('wm-name')?.value.trim();
  if(!name){toast('名前を入力してください','err');return;}
  const skills=document.getElementById('wm-skills')?.value.trim();
  const contact=document.getElementById('wm-contact')?.value.trim();
  const affiliation=document.getElementById('wm-affiliation')?.value.trim();
  const minFee=parseInt(document.getElementById('wm-minfee')?.value)||0;
  const workConditions=document.getElementById('wm-workcond')?.value.trim();
  const employStatus=document.getElementById('wm-status')?.value||'trial';
  if(!S.logs)S.logs=[];
  if(id){
    const w=S.workers.find(w=>w.id===id);
    const prevStatus=w?.employStatus||'trial';
    if(w)Object.assign(w,{name,skills,contact,affiliation,minFee,workConditions,employStatus});
    // 採用予定→トライアル昇格トースト
    if(prevStatus==='prospect'&&employStatus==='trial'){toast(`🎬 ${name} のトライアルを開始しました`);}
    // トライアル→本採用に変わった瞬間に採用自動記帳（result:'内定' で目標達成確認にカウント）
    if(prevStatus!=='hired'&&employStatus==='hired'){
      S.logs.push({id:uid(),type:'hire',date:today(),title:name,result:'内定',note:'本採用に変更時に自動記帳',createdAt:new Date().toISOString()});
      toast(`👤 ${name} の本採用を目標達成確認に記帳しました`);
    }
  }else{
    if(!S.workers)S.workers=[];
    const wid2=uid();
    S.workers.push({id:wid2,name,skills,contact,affiliation,minFee,workConditions,employStatus,createdAt:new Date().toISOString()});
    // 本採用で追加した場合のみ採用目標に記帳（トライアルは記帳しない）
    if(employStatus==='hired'){
      S.logs.push({id:uid(),type:'hire',date:today(),title:name,result:'内定',note:'本採用で追加時に自動記帳',sourceWorkerId:wid2,createdAt:new Date().toISOString()});
      toast(`👤 ${name} の本採用を目標に記帳しました`);
    }
  }
  save();closeModal();render();toast('ワーカー情報を保存しました');
}

function backfillGoalsData(){
  if(!confirm('既存のワーカー・クライアント・完了案件のデータを目標達成記録に一括登録します。重複は自動スキップされます。よろしいですか？'))return;
  if(!S.logs)S.logs=[];
  let hireN=0,salesN=0,revN=0;

  // 1. 既存ワーカー → 採用ログ（本採用のみ。トライアルは除外）
  (S.workers||[]).filter(w=>w.employStatus==='hired').forEach(w=>{
    const already=S.logs.find(l=>!l.deleted&&l.type==='hire'&&l.result==='内定'&&(l.sourceWorkerId===w.id||(l.title===w.name)));
    if(!already){
      const dt=(w.createdAt||new Date().toISOString()).slice(0,10);
      S.logs.push({id:uid(),type:'hire',date:dt,title:w.name,result:'内定',note:'過去データ一括登録',sourceWorkerId:w.id,createdAt:new Date().toISOString()});
      hireN++;
    }
  });
  // トライアルワーカーの誤った採用ログを削除
  (S.workers||[]).filter(w=>w.employStatus!=='hired').forEach(w=>{
    S.logs.filter(l=>!l.deleted&&l.type==='hire'&&l.result==='内定'&&(l.sourceWorkerId===w.id||l.title===w.name)).forEach(l=>{l.deleted=true;cleanN++;});
  });

  // 2. 既存クライアント → 営業（成約）ログ（トライアルは除外）
  (S.clients||[]).filter(c=>!c.deleted&&!c.isTrial).forEach(c=>{
    const already=S.logs.find(l=>!l.deleted&&l.type==='sales'&&l.result==='成約'&&(l.sourceClientId===c.id||(l.title===c.name)));
    if(!already){
      const dt=(c.createdAt||new Date().toISOString()).slice(0,10);
      S.logs.push({id:uid(),type:'sales',date:dt,title:c.name,result:'成約',note:'過去データ一括登録',sourceClientId:c.id,createdAt:new Date().toISOString()});
      salesN++;
    }
  });
  // トライアルクライアントの誤った成約ログを削除
  let cleanN=0;
  (S.clients||[]).filter(c=>c.isTrial).forEach(c=>{
    S.logs.filter(l=>!l.deleted&&l.type==='sales'&&l.result==='成約'&&(l.sourceClientId===c.id||l.title===c.name)).forEach(l=>{l.deleted=true;cleanN++;});
  });

  // 3. 完了案件 → 収益ログ
  (S.jobs||[]).filter(j=>!j.deleted&&j.status==='完了').forEach(j=>{
    const already=S.logs.find(l=>!l.deleted&&l.sourceJobId===j.id&&l.type==='revenue');
    if(!already){
      const amount=(j.unitPrice||0)-(j.workerPay||0);
      if(amount<=0)return;
      const dt=j.paymentDate||j.deliveryDate||(j.createdAt||new Date().toISOString()).slice(0,10);
      const client=S.clients?.find(c=>c.id===j.clientId);
      S.logs.push({id:uid(),type:'revenue',date:dt,title:j.title,clientId:j.clientId||null,amount,sourceJobId:j.id,note:'過去データ一括登録',createdAt:new Date().toISOString()});
      revN++;
    }
  });

  save();render();
  toast(`✅ 採用 ${hireN}件・営業 ${salesN}件・収益 ${revN}件 を登録${cleanN?`・${cleanN}件の誤ログを削除`:''}しました`);
}

function mdToHtml(text){
  const blocks=[];
  text=text.replace(/```([\w]*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    blocks.push({lang,code});return`\x00BLK${blocks.length-1}\x00`;
  });
  text=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text=text.replace(/\x00BLK(\d+)\x00/g,(_,i)=>{
    const b=blocks[i];const ec=b.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return`<pre><code${b.lang?` class="lang-${b.lang}"`:''} style="display:block">${ec}</code></pre>`;
  });
  text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.+?)\*/g,'<em>$1</em>');
  text=text.replace(/^### (.+)$/gm,'<h4 style="margin:8px 0 3px;font-size:13px">$1</h4>');
  text=text.replace(/^## (.+)$/gm,'<h3 style="margin:10px 0 4px;font-size:14px">$1</h3>');
  text=text.replace(/^# (.+)$/gm,'<h2 style="margin:12px 0 4px;font-size:15px;font-weight:700">$1</h2>');
  text=text.replace(/^[-*•] (.+)$/gm,'<li>$1</li>');
  text=text.replace(/(<li>[\s\S]+?<\/li>)/g,'<ul style="margin:6px 0;padding-left:18px">$1</ul>');
  text=text.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  text=text.replace(/\n\n/g,'<br><br>');
  text=text.replace(/\n/g,'<br>');
  return text;
}

    _chatHistory.push({role:'assistant',content:`❌ エラーが発生しました: ${e.message}`,model:_chatModel});
    console.error('AI error:',e);
  }
  _chatLoading=false;
  renderAIChatOnly();
}
async function callGemini(history,apiKey,ctx){
  const contents=history.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
  if(ctx&&contents.length===1){contents[0].parts[0].text=`【アプリ状況】\n${ctx}\n\n${contents[0].parts[0].text}`;}
  const useOAuth=apiKey==='__oauth__';
  const url=useOAuth
    ?'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent'
    :`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
  const headers={'Content-Type':'application/json'};
  if(useOAuth)headers['Authorization']=`Bearer ${_gcalToken}`;
  const res=await fetch(url,{method:'POST',headers,body:JSON.stringify({contents,generationConfig:{maxOutputTokens:2048}})});
  const d=await res.json();
  if(!res.ok){
    if(useOAuth&&res.status===403){
      throw new Error('Google API の権限が不足しています。Google Cloud プロジェクトで「Generative Language API」を有効にするか、設定画面でAPIキーを登録してください。');
    }
    throw new Error(d.error?.message||`Gemini API error (${res.status})`);
  }
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'(応答なし)';
}
async function callClaude(history,apiKey,system,ctx){
  const messages=history.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content}));
  if(ctx&&messages.length===1){messages[0].content=`【アプリ状況】\n${ctx}\n\n${messages[0].content}`;}
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2048,system,messages})
  });
  const d=await res.json();
  if(!res.ok)throw new Error(d.error?.message||`Claude API error (${res.status})`);
  return d.content?.[0]?.text||'(応答なし)';
}

function moveSub(btn,dir){
  const row=btn.parentElement;
  const cont=row.parentElement;
  const rows=[...cont.children];
  const i=rows.indexOf(row);
  const ni=i+dir;
  if(ni<0||ni>=rows.length)return;
  if(dir===-1)cont.insertBefore(row,rows[ni]);
  else cont.insertBefore(rows[ni],row);
}

function addSubWorker(btn){

function saveJob(){
  const title=document.getElementById('j-ttl')?.value.trim();
  if(!title){toast('タイトルを入力してください','err');return;}
  const oldSubs=EID?S.jobs.find(j=>j.id===EID)?.subtasks||[]:[];
  const subEls=[...document.querySelectorAll('#j-sub-cont .j-sub-row')];
  const subtasks=subEls.map((el,i)=>{
    const inp=el.querySelector('.j-sub-inp');const chk=el.querySelector('.chk');
    const price=parseInt(el.querySelector('.j-sub-price')?.value)||0;
    const pay=parseInt(el.querySelector('.j-sub-pay')?.value)||0;
    return{
      title:inp?.value.trim()||'',done:chk?.classList.contains('done')||false,
      unitPrice:price,workerPay:pay,
      status:el.querySelector('.j-sub-status')?.value||'未着手',
      workerId:el.querySelector('.j-sub-worker')?.value||null,
      sharedDate:el.querySelector('.j-sub-shared')?.value||null,
      editorDraftDate:el.querySelector('.j-sub-editor')?.value||null,
      clientDraftDate:el.querySelector('.j-sub-client')?.value||null,
      deliveryDate:el.querySelector('.j-sub-deliver')?.value||null,
      payoutDate:el.querySelector('.j-sub-payout')?.value||null,
    };
  }).filter(s=>s.title);
  const hasPricedSubs=subtasks.some(s=>s.unitPrice>0||s.workerPay>0);
  const unitPrice=hasPricedSubs?subtasks.reduce((s,sub)=>s+(sub.unitPrice||0),0):(parseInt(document.getElementById('j-unit')?.value)||0);
  const selWorkerIds=[...document.querySelectorAll('.j-worker-cb:checked')].map(cb=>cb.value);
  const onlySelf=selWorkerIds.length===0||selWorkerIds.every(id=>id===SELF_WID);
  const workerPay=hasPricedSubs?subtasks.filter(s=>s.workerId!==SELF_WID).reduce((s,sub)=>s+(sub.workerPay||0),0):(onlySelf?0:parseInt(document.getElementById('j-wpay')?.value)||0);
  const isTrial=document.getElementById('j-trial-val')?.value==='1';
  const data={title,clientId:document.getElementById('j-cl').value||null,workerIds:selWorkerIds,workerId:selWorkerIds[0]||null,scope:document.getElementById('j-scope').value||null,status:document.getElementById('j-stat').value,isTrial,unitPrice,profit:unitPrice,workerPay,sharedDate:document.getElementById('j-shared').value||null,editorDraftDate:document.getElementById('j-editor-draft').value||null,clientDraftDate:document.getElementById('j-client-draft').value||null,thumbnailDate:document.getElementById('j-thumbnail')?.value||null,deliveryDate:document.getElementById('j-deliver').value||null,invoiceDate:document.getElementById('j-invoice').value||null,paymentDate:document.getElementById('j-payin').value||null,payoutDate:document.getElementById('j-payout').value||null,notes:document.getElementById('j-notes').value.trim(),subtasks};
  if(EID){
    const j=S.jobs.find(j=>j.id===EID);
    const prevStatus=j?.status;
    if(j)Object.assign(j,data);
    // 完了に変更された瞬間に収益自動記帳
    if(prevStatus!=='完了'&&data.status==='完了'&&data.unitPrice>0){
      const profit=data.unitPrice-(data.workerPay||0);
      if(!S.logs)S.logs=[];
      const already=S.logs.find(l=>!l.deleted&&l.sourceJobId===EID&&l.type==='revenue');
      if(!already){
        S.logs.push({id:uid(),type:'revenue',date:today(),title:data.title,clientId:data.clientId||null,amount:profit,sourceJobId:EID,createdAt:new Date().toISOString()});
        toast(`💰 収益 ¥${profit.toLocaleString()} を目標達成確認に自動記帳しました`);
      }
    }
  }
  else S.jobs.unshift({id:uid(),...data,createdAt:new Date().toISOString()});
  save();closeModal();render();toast('案件を保存しました');
  if(_gcalToken&&S.settings?.sheetsId){const _sj=EID?S.jobs.find(j=>j.id===EID):S.jobs[0];if(_sj)sheetsWriteJob(_sj).then(()=>toast('📊 スプレッドシートを更新しました'));}
  // ※ GcalへのアプリデータWriteは行わない（読み戻し重複防止）
}

function toggleHabit(id,date){
  const h=S.habits.find(h=>h.id===id);if(!h)return;
  if(!h.completedDates)h.completedDates=[];
  if(!h.failedDates)h.failedDates=[];
  const done=h.completedDates.includes(date);
  const fail=h.failedDates.includes(date);
  if(!done&&!fail){
    // なし→✓
    h.completedDates.push(date);
    const s=calcStreak(h.completedDates);
    if(s%7===0&&s>0)toast(`🔥 ${s}日連続達成！素晴らしい！`);else toast('✅ 習慣を記録しました！');
  }else if(done){
    // ✓→✗
    h.completedDates=h.completedDates.filter(d=>d!==date);
    h.failedDates.push(date);
    toast('✕ できなかった日として記録しました');
  }else{
    // ✗→なし
    h.failedDates=h.failedDates.filter(d=>d!==date);
  }
  save();render();
}

let _pomoInterval=null,_pomoSec=0,_pomoRunning=false,_pomoMode='work',_pomoTaskId=null;
function initPomo(){_pomoSec=(S.settings.workMin||25)*60;updPomoDisp();}
function updPomoDisp(){
  const m=Math.floor(_pomoSec/60).toString().padStart(2,'0'),s=(_pomoSec%60).toString().padStart(2,'0');
  const el=document.getElementById('pomo-display');
  if(el){el.textContent=`${m}:${s}`;el.style.color=_pomoMode==='break'?'var(--green)':'var(--text)';}
  const btn=document.getElementById('pomo-go');
  if(btn)btn.textContent=_pomoRunning?'⏸ 停止':'▶ '+(_pomoSec<(_pomoMode==='work'?(S.settings.workMin||25):( S.settings.breakMin||5))*60?'再開':'開始');
}
function togglePomo(){
  if(_pomoRunning){clearInterval(_pomoInterval);_pomoRunning=false;updPomoDisp();return;}
  _pomoRunning=true;
  _pomoInterval=setInterval(()=>{
    _pomoSec--;updPomoDisp();
    if(_pomoSec<=0){
      clearInterval(_pomoInterval);_pomoRunning=false;
      if(_pomoMode==='work'){
        if(!S._pomoToday)S._pomoToday=0;S._pomoToday++;save();
        const cnt=S.pomodoroSessions?S.pomodoroSessions.length:0;
        if(!S.pomodoroSessions)S.pomodoroSessions=[];
        S.pomodoroSessions.push({date:today(),taskId:_pomoTaskId,dur:S.settings.workMin||25});
        save();updSessionCount();
        _pomoMode='break';_pomoSec=(S.settings.breakMin||5)*60;
        toast('🍅 ポモドーロ完了！休憩しましょう');
        if(typeof Notification!=='undefined'&&Notification.permission==='granted')new Notification('EditFlow',{body:'🍅 集中セッション完了！休憩してください'});
      }else{
        _pomoMode='work';_pomoSec=(S.settings.workMin||25)*60;
        const tn=document.getElementById('pomo-task-name');if(tn){tn.style.display='none';tn.textContent='';}
        _pomoTaskId=null;toast('☕ 休憩終了！次のセッションを始めましょう');
      }
      updPomoDisp();
    }
  },1000);
  if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();
}
function resetPomo(){
  clearInterval(_pomoInterval);_pomoRunning=false;_pomoMode='work';_pomoTaskId=null;
  _pomoSec=(S.settings.workMin||25)*60;
  const tn=document.getElementById('pomo-task-name');if(tn){tn.style.display='none';tn.textContent='';}
  updPomoDisp();
}
function startPomoFor(id){
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  _pomoTaskId=id;_pomoMode='work';_pomoSec=(S.settings.workMin||25)*60;
  const tn=document.getElementById('pomo-task-name');if(tn){tn.textContent=t.title;tn.style.display='block';}
  if(!_pomoRunning)togglePomo();
  toast(`🍅 「${t.title}」で集中開始！`);

// New page modal
function openNewPageModal(){
  openModal(`<div class="mhdr"><div class="mtitle">新しいページを作成</div><button class="mclose" onclick="closeModal()">✕</button></div>
<div class="fg"><div class="fl">ページタイトル *</div><input id="cp-ttl" placeholder="例：アイデアボード・進捗メモ"></div>
<div class="fg"><div class="fl">アイコン</div>
  <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px" id="cp-icon-row">
    ${CP_ICONS.map((ic,i)=>`<span class="icon-pick${i===0?' sel':''}" onclick="pickIcon('${ic}',this)">${ic}</span>`).join('')}
  </div>
  <input type="hidden" id="cp-icon-val" value="📄">
</div>
<div class="mfooter"><button class="btn btn-g" onclick="closeModal()">キャンセル</button><button class="btn btn-p" onclick="createCustomPage()">作成</button></div>`);
  document.getElementById('cp-ttl')?.focus();
}
function pickIcon(ic,el){
  document.querySelectorAll('.icon-pick').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');document.getElementById('cp-icon-val').value=ic;
}
function createCustomPage(){
  const title=document.getElementById('cp-ttl')?.value.trim();
  if(!title){toast('タイトルを入力してください','err');return;}
  const icon=document.getElementById('cp-icon-val')?.value||'📄';
  const page={id:uid(),title,icon,blocks:[]};
  if(!S.customPages)S.customPages=[];
  S.customPages.push(page);
  getNavCfg();save();closeModal();
  V=`cp_${page.id}`;render();
  setTimeout(()=>editCustomPage(page.id),80);
}
function delCustomPage(id){
  if(!confirm('このページを削除しますか？'))return;
  S.customPages=(S.customPages||[]).filter(p=>p.id!==id);
  if(S.navConfig)S.navConfig=S.navConfig.filter(c=>c.id!==`cp_${id}`);
  if(V===`cp_${id}`)V='customize';
  save();render();toast('ページを削除しました');
}
